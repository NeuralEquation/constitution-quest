/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十五条 国費を支出し、又は国が債務を負担するには、国会の議決に基くことを必要とする。","normalizedText":"第八十五条国費を支出し、又は国が債務を負担するには、国会の議決に基くことを必要とする。","normalizedBodyText":"国費を支出し、又は国が債務を負担するには、国会の議決に基くことを必要とする。"},{"id":"article-86","articleNumber":86,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"予算の作成","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十六条 内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を受け議決を経なければならない。","normalizedText":"第八十六条内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を受け議決を経なければならない。","segments":[{"type":"blank","blankId":"article-86-b1"},{"type":"text","text":"は、毎会計年度の予算を作成し、"},{"type":"blank","blankId":"article-86-b2"},{"type":"text","text":"に提出して、その審議を受け議決を経なければならない。"}],"normalizedBodyText":"内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を受け議決を経なければならない。","sourcePages":[11]},{"id":"article-87","articleNumber":87,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"予備費","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十七条 予見し難い予算の不足に充てるため、国会の議決に基いて予備費を設け、内閣の責任でこれを支出することができる。 2 すべて予備費の支出については、内閣は、事後に国会の承諾を得なければならない。","normalizedText":"第八十七条予見し難い予算の不足に充てるため、国会の議決に基いて予備費を設け、内閣の責任でこれを支出することができる。2すべて予備費の支出については、内閣は、事後に国会の承諾を得なければならない。","normalizedBodyText":"予見し難い予算の不足に充てるため、国会の議決に基いて予備費を設け、内閣の責任でこれを支出することができる。2すべて予備費の支出については、内閣は、事後に国会の承諾を得なければならない。"},{"id":"article-88","articleNumber":88,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"皇室財産及び皇室費用","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十八条 すべて皇室財産は、国に属する。すべて皇室の費用は、予算に計上して国会の議決を経なければならない。","normalizedText":"第八十八条すべて皇室財産は、国に属する。すべて皇室の費用は、予算に計上して国会の議決を経なければならない。","normalizedBodyText":"すべて皇室財産は、国に属する。すべて皇室の費用は、予算に計上して国会の議決を経なければならない。"},{"id":"article-89","articleNumber":89,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"公の財産の用途制限","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十九条 公金その他の公の財産は、宗教上の組織若しくは団体の使用、便益若しくは維持のため、又は公の支配に属しない慈善、教育若しくは博愛の事業に対し、これを支出し、又はその利用に供してはならない。","normalizedText":"第八十九条公金その他の公の財産は、宗教上の組織若しくは団体の使用、便益若しくは維持のため、又は公の支配に属しない慈善、教育若しくは博愛の事業に対し、これを支出し、又はその利用に供してはならない。","normalizedBodyText":"公金その他の公の財産は、宗教上の組織若しくは団体の使用、便益若しくは維持のため、又は公の支配に属しない慈善、教育若しくは博愛の事業に対し、これを支出し、又はその利用に供してはならない。"},{"id":"article-90","articleNumber":90,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"会計検査","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十条 国の収入支出の決算は、すべて毎年会計検査院がこれを検査し、内閣は、次の年度に、その検査報告とともに、これを国会に提出しなければならない。 2 会計検査院の組織及び権限は、法律でこれを定める。","normalizedText":"第九十条国の収入支出の決算は、すべて毎年会計検査院がこれを検査し、内閣は、次の年度に、その検査報告とともに、これを国会に提出しなければならない。2会計検査院の組織及び権限は、法律でこれを定める。","segments":[{"type":"text","text":"国の収入支出の"},{"type":"blank","blankId":"article-90-b1"},{"type":"text","text":"は、すべて毎年会計検査院がこれを検査し、内閣は、次の年度に、その検査報告とともに、これを国会に提出しなければならない。2会計検査院の組織及び権限は、法律でこれを定める。"}],"normalizedBodyText":"国の収入支出の決算は、すべて毎年会計検査院がこれを検査し、内閣は、次の年度に、その検査報告とともに、これを国会に提出しなければならない。2会計検査院の組織及び権限は、法律でこれを定める。","sourcePages":[11]},{"id":"article-91","articleNumber":91,"chapterId":"finance","chapterTitle":"第七章 財政","heading":"財政状況の報告","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十一条 内閣は、国会及び国民に対し、定期に、少くとも毎年一回、国の財政状況について報告しなければならない。","normalizedText":"第九十一条内閣は、国会及び国民に対し、定期に、少くとも毎年一回、国の財政状況について報告しなければならない。","normalizedBodyText":"内閣は、国会及び国民に対し、定期に、少くとも毎年一回、国の財政状況について報告しなければならない。"},{"id":"article-92","articleNumber":92,"chapterId":"local-government","chapterTitle":"第八章 地方自治","heading":"地方自治の本旨の確保","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十二条 地方公共団体の組織及び運営に関する事項は、地方自治の本旨に基いて、法律でこれを定める。","normalizedText":"第九十二条地方公共団体の組織及び運営に関する事項は、地方自治の本旨に基いて、法律でこれを定める。","segments":[{"type":"text","text":"地方公共団体の組織及び運営に関する事項は、地方自治の"},{"type":"blank","blankId":"article-92-b1"},{"type":"text","text":"に基いて、法律でこれを定める。"}],"normalizedBodyText":"地方公共団体の組織及び運営に関する事項は、地方自治の本旨に基いて、法律でこれを定める。","sourcePages":[11]},{"id":"article-93","articleNumber":93,"chapterId":"local-government","chapterTitle":"第八章 地方自治","heading":"地方公共団体の機関","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十三条 地方公共団体には、法律の定めるところにより、その議事機関として議会を設置する。 2 地方公共団体の長、その議会の議員及び法律の定めるその他の吏員は、その地方公共団体の住民が、直接これを選挙する。","normalizedText":"第九十三条地方公共団体には、法律の定めるところにより、その議事機関として議会を設置する。2地方公共団体の長、その議会の議員及び法律の定めるその他の吏員は、その地方公共団体の住民が、直接これを選挙する。","segments":[{"type":"text","text":"地方公共団体には、法律の定めるところにより、その議事機関として議会を設置する。2地方公共団体の長、その議会の議員及び法律の定めるその他の吏員は、その地方公共団体の"},{"type":"blank","blankId":"article-93-b1"},{"type":"text","text":"が、直接これを選挙する。"}],"normalizedBodyText":"地方公共団体には、法律の定めるところにより、その議事機関として議会を設置する。2地方公共団体の長、その議会の議員及び法律の定めるその他の吏員は、その地方公共団体の住民が、直接これを選挙する。","sourcePages":[11]},{"id":"article-94","articleNumber":94,"chapterId":"local-government","chapterTitle":"第八章 地方自治","heading":"地方公共団体の権能","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十四条 地方公共団体は、その財産を管理し、事務を処理し、及び行政を執行する権能を有し、法律の範囲内で条例を制定することができる。","normalizedText":"第九十四条地方公共団体は、その財産を管理し、事務を処理し、及び行政を執行する権能を有し、法律の範囲内で条例を制定することができる。","segments":[{"type":"text","text":"地方公共団体は、その財産を管理し、事務を処理し、及び行政を執行する権能を有し、"},{"type":"blank","blankId":"article-94-b1"},{"type":"text","text":"の範囲内で"},{"type":"blank","blankId":"article-94-b2"},{"type":"text","text":"を制定することができる。"}],"normalizedBodyText":"地方公共団体は、その財産を管理し、事務を処理し、及び行政を執行する権能を有し、法律の範囲内で条例を制定することができる。","sourcePages":[11]},{"id":"article-95","articleNumber":95,"chapterId":"local-government","chapterTitle":"第八章 地方自治","heading":"一の地方公共団体のみに適用される特別法","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十五条 一の地方公共団体のみに適用される特別法は、法律の定めるところにより、その地方公共団体の住民の投票においてその過半数の同意を得なければ、国会は、これを制定することができない。","normalizedText":"第九十五条一の地方公共団体のみに適用される特別法は、法律の定めるところにより、その地方公共団体の住民の投票においてその過半数の同意を得なければ、国会は、これを制定することができない。","segments":[{"type":"text","text":"一の地方公共団体のみに適用される特別法は、法律の定めるところにより、その地方公共団体の"},{"type":"blank","blankId":"article-95-b1"},{"type":"text","text":"の投票においてその過半数の同意を得なければ、国会は、これを制定することができない。"}],"normalizedBodyText":"一の地方公共団体のみに適用される特別法は、法律の定めるところにより、その地方公共団体の住民の投票においてその過半数の同意を得なければ、国会は、これを制定することができない。","sourcePages":[12]},{"id":"article-96","articleNumber":96,"chapterId":"amendment-supreme","chapterTitle":"第九章 改正","heading":"憲法改正の発議、国民投票及び公布","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十六条 この憲法の改正は、各議院の総議員の三分の二以上の賛成で、国会が、これを発議し、国民に提案してその承認を経なければならない。この承認には、特別の国民投票又は国会の定める選挙の際行はれる投票において、その過半数の賛成を必要とする。 2 憲法改正について前項の承認を経たときは、天皇は、国民の名で、この憲法と一体を成すものとして、直ちにこれを公布する。","normalizedText":"第九十六条この憲法の改正は、各議院の総議員の三分の二以上の賛成で、国会が、これを発議し、国民に提案してその承認を経なければならない。この承認には、特別の国民投票又は国会の定める選挙の際行はれる投票において、その過半数の賛成を必要とする。2憲法改正について前項の承認を経たときは、天皇は、国民の名で、この憲法と一体を成すものとして、直ちにこれを公布する。","segments":[{"type":"text","text":"この憲法の改正は、各議院の"},{"type":"blank","blankId":"article-96-b1"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-96-b2"},{"type":"text","text":"以上の賛成で、"},{"type":"blank","blankId":"article-96-b3"},{"type":"text","text":"が、これを発議し、国民に提案してその承認を経なければならない。この承認には、特別の国民投票又は国会の定める選挙の際行はれる投票において、その"},{"type":"blank","blankId":"article-96-b4"},{"type":"text","text":"の賛成を必要とする。2憲法改正について前項の承認を経たときは、天皇は、国民の名で、この憲法と一体を成すものとして、直ちにこれを"},{"type":"blank","blankId":"article-96-b5"},{"type":"text","text":"する。"}],"normalizedBodyText":"この憲法の改正は、各議院の総議員の三分の二以上の賛成で、国会が、これを発議し、国民に提案してその承認を経なければならない。この承認には、特別の国民投票又は国会の定める選挙の際行はれる投票において、その過半数の賛成を必要とする。2憲法改正について前項の承認を経たときは、天皇は、国民の名で、この憲法と一体を成すものとして、直ちにこれを公布する。","sourcePages":[12]},{"id":"article-97","articleNumber":97,"chapterId":"amendment-supreme","chapterTitle":"第十章 最高法規","heading":"基本的人権の由来特質","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十七条 この憲法が日本国民に保障する基本的人権は、人類の多年にわたる自由獲得の努力の成果であつて、これらの権利は、過去幾多の試錬に堪へ、現在及び将来の国民に対し、侵すことのできない永久の権利として信託されたものである。","normalizedText":"第九十七条この憲法が日本国民に保障する基本的人権は、人類の多年にわたる自由獲得の努力の成果であつて、これらの権利は、過去幾多の試錬に堪へ、現在及び将来の国民に対し、侵すことのできない永久の権利として信託されたものである。","segments":[{"type":"text","text":"この憲法が日本国民に保障する基本的人権は、人類の多年にわたる自由獲得の努力の成果であつて、これらの権利は、過去幾多の試錬に堪へ、"},{"type":"blank","blankId":"article-97-b1"},{"type":"text","text":"の国民に対し、侵すことのできない"},{"type":"blank","blankId":"article-97-b2"},{"type":"text","text":"として信託されたものである。"}],"normalizedBodyText":"この憲法が日本国民に保障する基本的人権は、人類の多年にわたる自由獲得の努力の成果であつて、これらの権利は、過去幾多の試錬に堪へ、現在及び将来の国民に対し、侵すことのできない永久の権利として信託されたものである。","sourcePages":[12]},{"id":"article-98","articleNumber":98,"chapterId":"amendment-supreme","chapterTitle":"第十章 最高法規","heading":"憲法の最高性と条約及び国際法規の遵守","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十八条 この憲法は、国の最高法規であつて、その条規に反する法律、命令、詔勅及び国務に関するその他の行為の全部又は一部は、その効力を有しない。 2 日本国が締結した条約及び確立された国際法規は、これを誠実に遵守することを必要とする。","normalizedText":"第九十八条この憲法は、国の最高法規であつて、その条規に反する法律、命令、詔勅及び国務に関するその他の行為の全部又は一部は、その効力を有しない。2日本国が締結した条約及び確立された国際法規は、これを誠実に遵守することを必要とする。","segments":[{"type":"text","text":"この憲法は、国の"},{"type":"blank","blankId":"article-98-b1"},{"type":"text","text":"であつて、その条規に反する法律、命令、詔勅及び国務に関するその他の行為の全部又は一部は、その"},{"type":"blank","blankId":"article-98-b2"},{"type":"text","text":"を有しない。2日本国が締結した"},{"type":"blank","blankId":"article-98-b3"},{"type":"text","text":"及び確立された国際法規は、これを誠実に遵守することを必要とする。"}],"normalizedBodyText":"この憲法は、国の最高法規であつて、その条規に反する法律、命令、詔勅及び国務に関するその他の行為の全部又は一部は、その効力を有しない。2日本国が締結した条約及び確立された国際法規は、これを誠実に遵守することを必要とする。","sourcePages":[12]},{"id":"article-99","articleNumber":99,"chapterId":"amendment-supreme","chapterTitle":"第十章 最高法規","heading":"憲法尊重擁護の義務","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九十九条 天皇又は摂政及び国務大臣、国会議員、裁判官その他の公務員は、この憲法を尊重し擁護する義務を負ふ。","normalizedText":"第九十九条天皇又は摂政及び国務大臣、国会議員、裁判官その他の公務員は、この憲法を尊重し擁護する義務を負ふ。","segments":[{"type":"text","text":"天皇又は摂政及び国務大臣、国会議員、裁判官その他の公務員は、この憲法を"},{"type":"blank","blankId":"article-99-b1"},{"type":"text","text":"し"},{"type":"blank","blankId":"article-99-b2"},{"type":"text","text":"する義務を負ふ。"}],"normalizedBodyText":"天皇又は摂政及び国務大臣、国会議員、裁判官その他の公務員は、この憲法を尊重し擁護する義務を負ふ。","sourcePages":[12]},{"id":"article-100","articleNumber":100,"chapterId":"amendment-supreme","chapterTitle":"第十一章 補則","heading":"施行期日と施行前の準備行為","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第百条 この憲法は、公布の日から起算して六箇月を経過した日から、これを施行する。 2 この憲法を施行するために必要な法律の制定、参議院議員の選挙及び国会召集の手続並びにこの憲法を施行するために必要な準備手続は、前項の期日よりも前に、これを行ふことができる。","normalizedText":"第百条この憲法は、公布の日から起算して六箇月を経過した日から、これを施行する。2この憲法を施行するために必要な法律の制定、参議院議員の選挙及び国会召集の手続並びにこの憲法を施行するために必要な準備手続は、前項の期日よりも前に、これを行ふことができる。","normalizedBodyText":"この憲法は、公布の日から起算して六箇月を経過した日から、これを施行する。2この憲法を施行するために必要な法律の制定、参議院議員の選挙及び国会召集の手続並びにこの憲法を施行するために必要な準備手続は、前項の期日よりも前に、これを行ふことができる。"},{"id":"article-101","articleNumber":101,"chapterId":"amendment-supreme","chapterTitle":"第十一章 補則","heading":"参議院成立前の国会","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第百一条 この憲法施行の際、参議院がまだ成立してゐないときは、その成立するまでの間、衆議院は、国会としての権限を行ふ。","normalizedText":"第百一条この憲法施行の際、参議院がまだ成立してゐないときは、その成立するまでの間、衆議院は、国会としての権限を行ふ。","normalizedBodyText":"この憲法施行の際、参議院がまだ成立してゐないときは、その成立するまでの間、衆議院は、国会としての権限を行ふ。"},{"id":"article-102","articleNumber":102,"chapterId":"amendment-supreme","chapterTitle":"第十一章 補則","heading":"参議院議員の任期の経過的特例","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第百二条 この憲法による第一期の参議院議員のうち、その半数の者の任期は、これを三年とする。その議員は、法律の定めるところにより、これを定める。","normalizedText":"第百二条この憲法による第一期の参議院議員のうち、その半数の者の任期は、これを三年とする。その議員は、法律の定めるところにより、これを定める。","normalizedBodyText":"この憲法による第一期の参議院議員のうち、その半数の者の任期は、これを三年とする。その議員は、法律の定めるところにより、これを定める。"},{"id":"article-103","articleNumber":103,"chapterId":"amendment-supreme","chapterTitle":"第十一章 補則","heading":"公務員の地位に関する経過規定","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第百三条 この憲法施行の際現に在職する国務大臣、衆議院議員及び裁判官並びにその他の公務員で、その地位に相応する地位がこの憲法で認められてゐる者は、法律で特別の定をした場合を除いては、この憲法施行のため、当然にはその地位を失ふことはない。但し、この憲法によつて、後任者が選挙又は任命されたときは、当然その地位を失ふ。","normalizedText":"第百三条この憲法施行の際現に在職する国務大臣、衆議院議員及び裁判官並びにその他の公務員で、その地位に相応する地位がこの憲法で認められてゐる者は、法律で特別の定をした場合を除いては、この憲法施行のため、当然にはその地位を失ふことはない。但し、この憲法によつて、後任者が選挙又は任命されたときは、当然その地位を失ふ。","normalizedBodyText":"この憲法施行の際現に在職する国務大臣、衆議院議員及び裁判官並びにその他の公務員で、その地位に相応する地位がこの憲法で認められてゐる者は、法律で特別の定をした場合を除いては、この憲法施行のため、当然にはその地位を失ふことはない。但し、この憲法によつて、後任者が選挙又は任命されたときは、当然その地位を失ふ。"}],"blanks":[{"id":"preamble-b1","chapterId":"overview","articleNumber":0,"heading":"前文","before":"日本国民は、正当に","answer":"選挙","after":"された国会における代表者を通じて行動し、われらとわれらの子孫のために、諸国民との協和による成果と、わが国全土にわたつて自由のもたらす恵沢を確保し、政府の行為によつて再び戦争の惨禍が起ることのないやうにすることを決意し、ここに主権が国民に存することを宣言し、この憲法を確定する。そもそも国政は、国民の厳粛な信託によるものであつて、その権威は国民に由来し、その権力は国民の代表者がこれを行使し、その福利は国民がこれを享受する。これは人類普遍の原理であり、この憲法は、かかる原理に基くものである。われらは、これに反する一切の憲法、法令及び詔勅を排除する。日本国民は、恒久の平和を念願し、人間相互の関係を支配する崇高な理想を深く自覚するのであつて、平和を愛する諸国民の公正と信義に信頼して、われらの安全と生存を保持しようと決意した。われらは、平和を維持し、専制と隷従、圧迫と偏狭を地上から永遠に除去しようと努めてゐる国際社会において、名誉ある地位を占めたいと思ふ。われらは、全世界の国民が、ひとしく恐怖と欠乏から免かれ、平和のうちに生存する権利を有することを確認する。われらは、いづれの国家も、自国のことのみに専念して他国を無視してはならないのであつて、政治道徳の法則は、普遍的なものであり、この法則に従ふことは、自国の主権を維持し、他国と対等関係に立たうとする各国の責務であると信ずる。日本国民は、国家の名誉にかけ、全力をあげてこの崇高な理想と目的を達成することを誓ふ。","acceptedAnswers":["選挙"],"sourcePage":2,"reviewed":true,"difficulty":1,"tags":["概要・前文","前文"],"sourceKind":"official-aligned"},{"id":"preamble-b2","chapterId":"overview","articleNumber":0,"heading":"前文","before":"日本国民は、正当に選挙された国会における","answer":"代表者","after":"を通じて行動し、われらとわれらの子孫のために、諸国民との協和による成果と、わが国全土にわたつて自由のもたらす恵沢を確保し、政府の行為によつて再び戦争の惨禍が起ることのないやうにすることを決意し、ここに主権が国民に存することを宣言し、この憲法を確定する。そもそも国政は、国民の厳粛な信託によるものであつて、その権威は国民に由来し、その権力は国民の代表者がこれを行使し、その福利は国民がこれを享受する。これは人類普遍の原理であり、この憲法は、かかる原理に基くものである。われらは、これに反する一切の憲法、法令及び詔勅を排除する。日本国民は、恒久の平和を念願し、人間相互の関係を支配する崇高な理想を深く自覚するのであつて、平和を愛する諸国民の公正と信義 (function (root, factory) {
  const api = factory();
  if (typeof module === "object" && module.exports) module.exports = api;
  else root.ConstitutionQuestCore = api;
})(typeof globalThis !== "undefined" ? globalThis : this, function () {
  "use strict";

  const MODE_XP = Object.freeze({ choice: 1, puzzle: 2, hint: 3, strict: 5, article: 8, boss: 5 });

  function normalizeAnswer(value) {
    return String(value ?? "")
      .normalize("NFKC")
      .replace(/[\s\u3000]+/g, "")
      .trim();
  }

  function isAnswerCorrect(value, question) {
    const normalized = normalizeAnswer(value);
    return (question.acceptedAnswers || [question.answer]).some(answer => normalizeAnswer(answer) === normalized);
  }

  function hashSeed(value) {
    let hash = 2166136261;
    for (const char of String(value)) {
      hash ^= char.charCodeAt(0);
      hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
  }

  function seededRandom(seed) {
    let state = hashSeed(seed) || 1;
    return function random() {
      state += 0x6D2B79F5;
      let value = state;
      value = Math.imul(value ^ (value >>> 15), value | 1);
      value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
      return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffle(items, random = Math.random) {
    const result = items.slice();
    for (let index = result.length - 1; index > 0; index -= 1) {
      const target = Math.floor(random() * (index + 1));
      [result[index], result[target]] = [result[target], result[index]];
    }
    return result;
  }

  function questionKey(question) {
    return question.articleNumber == null ? `summary:${question.id}` : `article:${question.articleNumber}`;
  }

  function createExam(pool, count = 30, seed = Date.now()) {
    const random = seededRandom(seed);
    const shuffled = shuffle(pool, random);
    const selected = [];
    const articleCounts = new Map();
    for (const question of shuffled) {
      const key = questionKey(question);
      const used = articleCounts.get(key) || 0;
      if (used >= 2) continue;
      selected.push(question);
      articleCounts.set(key, used + 1);
      if (selected.length >= Math.min(count, pool.length)) break;
    }
    if (selected.length < Math.min(count, pool.length)) {
      for (const question of shuffled) {
        if (selected.some(item => item.id === question.id)) continue;
        selected.push(question);
        if (selected.length >= Math.min(count, pool.length)) break;
      }
    }
    return selected;
  }

  function buildChoices(question, pool, count = 4, random = Math.random) {
    const answer = normalizeAnswer(question.answer);
    const candidates = pool
      .filter(item => item.id !== question.id && normalizeAnswer(item.answer) !== answer)
      .sort((a, b) => {
        const aChapter = a.chapterId === question.chapterId ? 0 : 1;
        const bChapter = b.chapterId === question.chapterId ? 0 : 1;
        if (aChapter !== bChapter) return aChapter - bChapter;
        return Math.abs(a.answer.length - question.answer.length) - Math.abs(b.answer.length - question.answer.length);
      });
    const close = candidates.slice(0, Math.max(12, count * 4));
    return shuffle([question.answer, ...shuffle(close, random).slice(0, count - 1)], random);
  }

  function buildPuzzleTiles(answer, random = Math.random) {
    const characters = Array.from(String(answer ?? ""));
    if (!characters.length) return [];
    const chunkSize = characters.length <= 4 ? 1 : characters.length <= 9 ? 2 : 3;
    const tiles = [];
    for (let index = 0; index < characters.length; index += chunkSize) {
      tiles.push({ id: `tile-${tiles.length}`, text: characters.slice(index, index + chunkSize).join("") });
    }
    const shuffled = shuffle(tiles, random);
    if (shuffled.length > 1 && shuffled.every((tile, index) => tile.id === tiles[index].id)) {
      shuffled.push(shuffled.shift());
    }
    return shuffled;
  }

  function defaultItemProgress() {
    return { attempts: 0, correct: 0, wrong: 0, streak: 0, mastery: 0, stars: 0, lastSeen: null, lastStrictDate: null, nextReview: null, recentMistakes: 0 };
  }

  function finiteNumber(value, fallback = 0) {
    if (typeof value !== "number" && typeof value !== "string") return fallback;
    const number = Number(value);
    return Number.isFinite(number) ? number : fallback;
  }

  function sanitizeProgress(saved) {
    const source = saved && typeof saved === "object" && !Array.isArray(saved) ? saved : {};
    const items = {};
    if (source.items && typeof source.items === "object" && !Array.isArray(source.items)) {
      for (const [id, value] of Object.entries(source.items)) {
        if (!value || typeof value !== "object" || Array.isArray(value)) continue;
        const item = { ...defaultItemProgress() };
        for (const key of ["attempts", "correct", "wrong", "streak", "mastery", "stars", "recentMistakes"]) {
          item[key] = Math.max(0, finiteNumber(value[key]));
        }
        for (const key of ["lastSeen", "lastStrictDate", "nextReview"]) {
          item[key] = typeof value[key] === "string" ? value[key] : null;
        }
        items[id] = item;
      }
    }
    const examHistory = Array.isArray(source.examHistory) ? source.examHistory.filter(record => record && typeof record === "object" && !Array.isArray(record)).slice(0, 20) : [];
    const bossClears = {};
    if (source.bossClears && typeof source.bossClears === "object" && !Array.isArray(source.bossClears)) {
      for (const [id, clear] of Object.entries(source.bossClears)) {
        if (!clear || typeof clear !== "object" || Array.isArray(clear)) continue;
        bossClears[id] = {
          stars: Math.min(3, Math.max(0, Math.floor(finiteNumber(clear.stars)))),
          rate: Math.min(1, Math.max(0, finiteNumber(clear.rate))),
          date: typeof clear.date === "string" ? clear.date : null,
        };
      }
    }
    return {
      version: 1,
      xp: Math.max(0, finiteNumber(source.xp)),
      combo: Math.max(0, finiteNumber(source.combo)),
      bestCombo: Math.max(0, finiteNumber(source.bestCombo)),
      todayDate: typeof source.todayDate === "string" ? source.todayDate : null,
      todayCorrect: Math.max(0, finiteNumber(source.todayCorrect)),
      studyDays: Array.isArray(source.studyDays) ? source.studyDays.filter(day => typeof day === "string").slice(-120) : [],
      items,
      examHistory,
      bossClears,
    };
  }

  function updateItemProgress(previous, correct, mode, now = new Date()) {
    const item = { ...defaultItemProgress(), ...(previous || {}) };
    item.attempts += 1;
    item.lastSeen = now.toISOString();
    if (correct) {
      item.correct += 1;
      item.streak += 1;
      item.recentMistakes = Math.max(0, item.recentMistakes - 1);
      const gain = { choice: 0.35, puzzle: 0.55, hint: 0.8, strict: 1.15, article: 1.35, boss: 1.25 }[mode] || 0.5;
      item.mastery = Math.min(3, item.mastery + gain);
      if (mode === "choice" || mode === "puzzle") item.stars = Math.max(item.stars, 1);
      if (mode === "hint") item.stars = Math.max(item.stars, 2);
      if (["strict", "article", "boss"].includes(mode)) {
        const today = now.toISOString().slice(0, 10);
        const provenOnAnotherDay = item.lastStrictDate && item.lastStrictDate !== today;
        item.stars = Math.max(item.stars, provenOnAnotherDay ? 3 : 2);
        item.lastStrictDate = today;
      }
      const days = mode === "choice" ? 0.25 : item.stars >= 3 ? 3 : item.stars >= 2 ? 1 : 0.5;
      item.nextReview = new Date(now.getTime() + days * 86400000).toISOString();
    } else {
      item.wrong += 1;
      item.streak = 0;
      item.recentMistakes += 1;
      item.mastery = Math.max(0, item.mastery - 0.7);
      item.nextReview = new Date(now.getTime() + 10 * 60000).toISOString();
    }
    return item;
  }

  function calculateXp(mode, correct, options = {}) {
    if (!correct) return 0;
    const base = MODE_XP[mode] || 1;
    return base + (options.perfectBoss ? 10 : 0);
  }

  function enqueueRetry(queue, question, currentIndex, random = Math.random) {
    const delay = 3 + Math.floor(random() * 4);
    const insertAt = Math.min(queue.length, currentIndex + delay);
    const result = queue.slice();
    result.splice(insertAt, 0, question);
    return result;
  }

  function selectQuest(pool, itemProgress, count = 10, now = new Date(), random = Math.random) {
    const stateFor = item => ({ ...defaultItemProgress(), ...(itemProgress[item.id] || {}) });
    const unseen = shuffle(pool.filter(item => stateFor(item).attempts === 0), random);
    const weak = shuffle(pool.filter(item => stateFor(item).wrong > 0 || stateFor(item).recentMistakes > 0), random)
      .sort((a, b) => stateFor(b).recentMistakes - stateFor(a).recentMistakes);
    const due = shuffle(pool.filter(item => {
      const state = stateFor(item);
      return state.nextReview && new Date(state.nextReview) <= now;
    }), random);
    const result = [];
    const pushUnique = item => {
      if (item && !result.some(existing => existing.id === item.id)) result.push(item);
    };
    unseen.slice(0, Math.ceil(count / 2)).forEach(pushUnique);
    [...weak, ...due, ...shuffle(pool, random)].forEach(item => {
      if (result.length < count) pushUnique(item);
    });
    return result;
  }

  function masteryRate(pool, itemProgress) {
    if (!pool.length) return 0;
    const stars = pool.reduce((sum, item) => sum + ((itemProgress[item.id] || {}).stars || 0), 0);
    return Math.round((stars / (pool.length * 3)) * 100);
  }

  function contextFor(question, radius = 72) {
    const before = question.before || "";
    const after = question.after || "";
    return {
      before: `${before.length > radius ? "…" : ""}${before.slice(-radius)}`,
      after: `${after.slice(0, radius)}${after.length > radius ? "…" : ""}`,
    };
  }

  function hintFor(answer, type) {
    const characters = Array.from(answer);
    if (type === "none") return "ヒントなし";
    if (type === "length") return `${characters.length}文字`;
    if (type === "first") return `${characters[0]}${"○".repeat(Math.max(0, characters.length - 1))}`;
    return `${characters.length}文字 / ${characters[0]}から始まる`;
  }

  return {
    MODE_XP,
    normalizeAnswer,
    isAnswerCorrect,
    hashSeed,
    seededRandom,
    shuffle,
    createExam,
    buildChoices,
    buildPuzzleTiles,
    defaultItemProgress,
    sanitizeProgress,
    updateItemProgress,
    calculateXp,
    enqueueRetry,
    selectQuest,
    masteryRate,
    contextFor,
    hintFor,
  };
});

</script>
<script data-source="app.js">
(() => {
  "use strict";

  const Core = window.ConstitutionQuestCore;
  const STORAGE_KEY = "constitutionQuestProgressV1";
  const SETTINGS_KEY = "constitutionQuestSettingsV1";
  const DATA_FILES = ["chapters", "articles", "blanks", "summary_questions", "stages"];
  const app = document.querySelector("#app");
  const toast = document.querySelector("#toast");
  const networkStatus = document.querySelector("#network-status");

  let data = null;
  let progress = loadProgress();
  let settings = loadSettings();
  let currentView = "home";
  let session = null;
  let timerHandle = null;
  let deferredInstallPrompt = null;

  function displayText(value) {
    if (value == null) return "";
    if (["string", "number", "boolean"].includes(typeof value)) return String(value);
    if (Array.isArray(value)) return value.map(displayText).filter(Boolean).join(" / ");
    if (typeof value === "object") {
      for (const key of ["text", "answer", "name", "label", "value"]) {
        if (["string", "number", "boolean"].includes(typeof value[key])) return String(value[key]);
      }
      try { return JSON.stringify(value); } catch { return "表示できないデータ"; }
    }
    return "";
  }

  function escapeHtml(value) {
    return displayText(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function loadProgress() {
    const fallback = {
      version: 1,
      xp: 0,
      combo: 0,
      bestCombo: 0,
      todayDate: localDateKey(),
      todayCorrect: 0,
      studyDays: [],
      items: {},
      examHistory: [],
      bossClears: {},
    };
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      if (!saved) return fallback;
      const clean = Core.sanitizeProgress(saved);
      return { ...fallback, ...clean, todayDate: clean.todayDate || fallback.todayDate };
    } catch {
      return fallback;
    }
  }

  function loadSettings() {
    const fallback = { showHeadings: true, hintType: "first", sound: false };
    try {
      const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
      if (!saved || typeof saved !== "object" || Array.isArray(saved)) return fallback;
      return {
        showHeadings: typeof saved.showHeadings === "boolean" ? saved.showHeadings : fallback.showHeadings,
        hintType: ["first", "length", "group", "both", "none"].includes(saved.hintType) ? saved.hintType : fallback.hintType,
        sound: typeof saved.sound === "boolean" ? saved.sound : fallback.sound,
      };
    } catch {
      return fallback;
    }
  }

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }

  function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  function localDateKey(date = new Date()) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function recordStudyDay() {
    const today = localDateKey();
    if (progress.todayDate !== today) {
      progress.todayDate = today;
      progress.todayCorrect = 0;
    }
    if (!progress.studyDays.includes(today)) progress.studyDays.push(today);
    progress.studyDays = progress.studyDays.slice(-120);
  }

  function studyStreak() {
    const days = new Set(progress.studyDays);
    let cursor = new Date();
    if (!days.has(localDateKey(cursor))) cursor.setDate(cursor.getDate() - 1);
    let count = 0;
    while (days.has(localDateKey(cursor))) {
      count += 1;
      cursor.setDate(cursor.getDate() - 1);
    }
    return count;
  }

  async function loadData() {
    const bundledData = window.CONSTITUTION_QUEST_DATA;
    if (bundledData && DATA_FILES.every(name => Array.isArray(bundledData[name]))) {
      data = Object.fromEntries(DATA_FILES.map(name => [name, bundledData[name]]));
    } else {
      const values = await Promise.all(DATA_FILES.map(async name => {
        const response = await fetch(`./data/${name}.json`);
        if (!response.ok) throw new Error(`${name}.json: ${response.status}`);
        return response.json();
      }));
      data = Object.fromEntries(DATA_FILES.map((name, index) => [name, values[index]]));
    }
    data.questions = [...data.blanks, ...data.summary_questions];
    const requiredTextFields = ["id", "chapterId", "heading", "before", "answer", "after"];
    for (const question of data.questions) {
      const invalid = requiredTextFields.find(field => typeof question[field] !== "string");
      if (invalid) throw new Error(`問題データ ${question.id || "ID不明"} の ${invalid} が文字列ではありません`);
      if (!Array.isArray(question.acceptedAnswers) || question.acceptedAnswers.some(answer => typeof answer !== "string")) {
        throw new Error(`問題データ ${question.id} の正解候補が不正です`);
      }
    }
    data.questionById = Object.fromEntries(data.questions.map(item => [item.id, item]));
    data.articleByNumber = Object.fromEntries(data.articles.map(item => [item.articleNumber, item]));
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    window.setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function setView(view) {
    stopTimer();
    currentView = view;
    session = null;
    render();
    app.focus({ preventScroll: true });
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function render() {
    if (!data) return;
    if (currentView === "home") renderHome();
    else if (currentView === "study") renderStudy();
    else if (currentView === "result") renderResult();
    else if (currentView === "answers") renderAnswers();
    else if (currentView === "settings") renderSettings();
  }

  function weakCount() {
    return data.questions.filter(item => (progress.items[item.id]?.wrong || 0) > 0).length;
  }

  function renderHome() {
    const mastery = Core.masteryRate(data.questions, progress.items);
    app.innerHTML = `
      <section class="hero">
        <div class="hero-main">
          <p class="eyebrow">288 blanks / 13 areas</p>
          <h1>条文を読み、欠けた語句を<br>自力で復元する。</h1>
          <p class="lead">課題プリントの全空欄を、衆議院掲載の公式全文と照合済み。まずは10問、慣れたら見出しなしの15分模試へ。</p>
          <div class="hero-actions">
            <button class="primary-button" data-action="start-quest" data-count="10" data-mode="mixed">新規5問 + 弱点5問</button>
            <button class="secondary-button" data-action="start-exam">15分本番模試</button>
          </div>
        </div>
        <aside class="panel quest-list" aria-label="今日のクエスト">
          <button class="quest-button" data-action="start-quest" data-count="5" data-mode="strict"><span class="quest-icon">5</span><span><b>5問だけ</b><small>厳密入力で短く集中</small></span><span>›</span></button>
          <button class="quest-button" data-action="start-quest" data-count="50" data-minutes="5" data-mode="mixed"><span class="quest-icon">5分</span><span><b>5分だけ</b><small>時間で自動終了</small></span><span>›</span></button>
          <button class="quest-button" data-action="start-quest" data-count="10" data-filter="weak" data-mode="mixed"><span class="quest-icon">弱</span><span><b>今日の弱点</b><small>${weakCount()}件から優先</small></span><span>›</span></button>
          <button class="quest-button" data-action="start-quest" data-count="10" data-filter="yesterday" data-mode="strict"><span class="quest-icon">昨</span><span><b>昨日のミス</b><small>前日に間違えた空欄</small></span><span>›</span></button>
          <button class="quest-button" data-action="start-quest" data-count="5" data-filter="new" data-mode="choice"><span class="quest-icon">新</span><span><b>新しい条文を5個</b><small>未学習から開始</small></span><span>›</span></button>
        </aside>
      </section>

      <section class="metrics" aria-label="学習状況">
        ${metric("全体習得率", `${mastery}%`)}
        ${metric("今日の正解", `${progress.todayDate === localDateKey() ? progress.todayCorrect : 0}問`)}
        ${metric("連続学習", `${studyStreak()}日`)}
        ${metric("XP / 弱点", `${progress.xp} / ${weakCount()}`)}
      </section>

      <section aria-labelledby="mode-title">
        <div class="section-heading"><div><p class="eyebrow">Training modes</p><h2 id="mode-title">学習モード</h2></div></div>
        <div class="chapter-grid">
          ${modeCard("choice", "意味つなぎ", "4択で文脈と語句を結ぶ", "1 XP")}
          ${modeCard("puzzle", "条文復元パズル", "語句タイルで欠けた箇所を戻す", "2 XP")}
          ${modeCard("hint", "一部ヒント入力", "先頭文字や文字数から入力", "3 XP")}
          ${modeCard("strict", "本番入力", "見出しなし・完全一致で判定", "5 XP")}
          ${modeCard("article", "条文連続復元", "1条の複数空欄を一括入力", "8 XP")}
          ${modeCard("exam", "15分本番模試", "30空欄・答え合わせは終了後", "本番")}
        </div>
      </section>

      <section aria-labelledby="map-title">
        <div class="section-heading"><div><p class="eyebrow">Area map</p><h2 id="map-title">章ごとのマップ</h2><p>学習する章を選ぶか、80%以上で章ボスをクリア。</p></div></div>
        <div class="chapter-grid">${data.chapters.map(renderChapterCard).join("")}</div>
      </section>`;
  }

  function metric(label, value) {
    return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
  }

  function modeCard(mode, title, description, badge) {
    const action = mode === "exam" ? "start-exam" : mode === "article" ? "start-article" : "start-quest";
    return `<article class="chapter-card"><div class="chapter-top"><div><span class="chapter-number">${escapeHtml(badge)}</span><h3>${escapeHtml(title)}</h3></div></div><p class="lead">${escapeHtml(description)}</p><button class="ghost-button" data-action="${action}" data-mode="${mode}" data-count="10">始める</button></article>`;
  }

  function renderChapterCard(chapter) {
    const pool = data.questions.filter(item => item.chapterId === chapter.id);
    const rate = Core.masteryRate(pool, progress.items);
    const clear = progress.bossClears[chapter.id];
    return `<article class="chapter-card">
      <div class="chapter-top"><div><span class="chapter-number">AREA ${String(chapter.order).padStart(2, "0")}</span><h3>${escapeHtml(chapter.name)}</h3><small>${escapeHtml(chapter.range)}</small></div><span title="章ボス評価">${clear ? "★".repeat(clear.stars) : "☆"}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${rate}%"></div></div>
      <div class="chapter-meta"><span>${rate}% 習得</span><span>${chapter.blankCount}空欄</span></div>
      <div class="chapter-actions"><button class="ghost-button" data-action="start-quest" data-chapter="${chapter.id}" data-mode="mixed" data-count="10">学習</button><button class="secondary-button" data-action="start-boss" data-chapter="${chapter.id}">ボス</button></div>
    </article>`;
  }

  function filteredPool(filter, chapterId) {
    let pool = data.questions.filter(item => !chapterId || item.chapterId === chapterId);
    if (filter === "weak") pool = pool.filter(item => (progress.items[item.id]?.wrong || 0) > 0);
    if (filter === "new") pool = pool.filter(item => !(progress.items[item.id]?.attempts));
    if (filter === "yesterday") {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const key = localDateKey(yesterday);
      pool = pool.filter(item => progress.items[item.id]?.lastSeen?.slice(0, 10) === key && (progress.items[item.id]?.recentMistakes || 0) > 0);
    }
    return pool;
  }

  function startQuest({ count = 10, mode = "mixed", filter = "", chapterId = "", durationMinutes = 0 } = {}) {
    const pool = filteredPool(filter, chapterId);
    if (!pool.length) {
      showToast(filter === "yesterday" ? "昨日のミスはまだありません" : "この条件に合う問題はまだありません");
      return;
    }
    const queue = filter ? Core.shuffle(pool).slice(0, count) : Core.selectQuest(pool, progress.items, count);
    session = {
      type: "quiz", mode, chapterId, queue, index: 0, selected: null, feedback: null,
      correct: 0, wrong: 0, xp: 0, mistakes: [], startedAt: Date.now(), answerLog: [],
      deadline: durationMinutes ? Date.now() + durationMinutes * 60 * 1000 : null,
    };
    currentView = "study";
    if (session.deadline) startTimer();
    render();
    focusAnswerControl();
  }

  function startBoss(chapterId) {
    const pool = data.questions.filter(item => item.chapterId === chapterId);
    const count = Math.min(20, Math.max(10, pool.length));
    session = {
      type: "quiz", mode: "boss", chapterId, queue: Core.shuffle(pool).slice(0, count), index: 0,
      selected: null, feedback: null, correct: 0, wrong: 0, xp: 0, mistakes: [], answerLog: [],
      startedAt: Date.now(), deadline: Date.now() + 10 * 60 * 1000,
    };
    currentView = "study";
    startTimer();
    render();
    focusAnswerControl();
  }

  function startExam() {
    const seed = `${Date.now()}-${Math.random()}`;
    session = {
      type: "exam", mode: "exam", seed, queue: Core.createExam(data.questions, 30, seed), index: 0,
      responses: {}, correct: 0, wrong: 0, mistakes: [], startedAt: Date.now(), deadline: Date.now() + 15 * 60 * 1000,
    };
    currentView = "study";
    startTimer();
    render();
    focusAnswerControl();
  }

  function startArticleMode(chapterId = "") {
    const candidates = data.articles.filter(article => {
      const blanks = (article.segments || []).filter(segment => segment.type === "blank");
      return blanks.length >= 2 && (!chapterId || article.chapterId === chapterId);
    });
    if (!candidates.length) return showToast("複数空欄のある条文がありません");
    session = { type: "article", mode: "article", article: Core.shuffle(candidates)[0], values: {}, result: null, startedAt: Date.now() };
    currentView = "study";
    render();
    focusAnswerControl();
  }

  function currentQuestion() {
    return session?.queue?.[session.index] || null;
  }

  function effectiveMode(question) {
    if (session.mode !== "mixed") return session.mode;
    const item = progress.items[question.id];
    return !item?.attempts ? "choice" : item.recentMistakes > 0 ? "strict" : "hint";
  }

  function renderStudy() {
    if (session.type === "article") return renderArticleSession();
    const question = currentQuestion();
    if (!question) return finishSession();
    const mode = effectiveMode(question);
    const isExam = session.type === "exam";
    const hideHeading = isExam || session.mode === "boss" || !settings.showHeadings;
    const context = Core.contextFor(question, question.articleNumber === 0 ? 96 : 72);
    const chapter = data.chapters.find(item => item.id === question.chapterId);
    const progressPercent = Math.round((session.index / session.queue.length) * 100);
    const articleLabel = question.articleNumber == null ? "概要" : question.articleNumber === 0 ? "前文" : `第${question.articleNumber}条`;

    app.innerHTML = `<div class="study-shell">
      <div class="page-header"><button class="back-button" data-nav="home">← 終了してトップへ</button>${isExam ? `<button class="ghost-button" data-action="submit-exam">途中提出</button>` : ""}</div>
      <div class="study-status">
        <div><small>${escapeHtml(chapter?.name || "全範囲")}</small><div class="progress-track"><div class="progress-fill" style="width:${progressPercent}%"></div></div></div>
        <span class="study-chip">${session.index + 1} / ${session.queue.length}</span>
        ${session.deadline ? `<span id="timer" class="study-chip timer">${formatRemaining()}</span>` : `<span class="study-chip">${progress.combo} COMBO · ${progress.xp} XP</span>`}
      </div>
      <article class="study-card">
        <div class="article-meta"><span class="article-label">${escapeHtml(modeName(mode))}</span><span>${escapeHtml(articleLabel)}</span>${hideHeading ? "" : `<span>〔${escapeHtml(question.heading)}〕</span>`}<span>課題PDF p.${question.sourcePage}</span></div>
        ${isExam ? `<p class="exam-note">模試中は正解を表示しません。入力後、次の問題へ進んでください。</p>` : ""}
        <div class="question-text">${escapeHtml(context.before)}<span class="blank-mark">＿＿＿＿</span>${escapeHtml(context.after)}</div>
        ${renderAnswerControl(question, mode, isExam)}
        ${session.feedback ? renderFeedback(question, session.feedback) : ""}
        <div class="study-actions">${renderStudyActions(mode, isExam)}</div>
      </article>
    </div>`;
  }

  function renderAnswerControl(question, mode, isExam) {
    if (session.feedback) return "";
    if (mode === "puzzle") {
      if (session.puzzleQuestionId !== question.id) {
        session.puzzleQuestionId = question.id;
        session.puzzleTiles = Core.buildPuzzleTiles(question.answer);
        session.puzzleSelected = [];
      }
      const selected = session.puzzleSelected || [];
      const available = session.puzzleTiles.filter(tile => !selected.includes(tile.id));
      const assembled = selected.map(id => session.puzzleTiles.find(tile => tile.id === id)?.text || "").join("");
      return `<div class="puzzle-board" aria-label="語句タイルパズル">
        <div class="puzzle-answer" aria-live="polite">${assembled ? escapeHtml(assembled) : `<span>下のタイルを順番に選択</span>`}</div>
        <div class="puzzle-tiles">${available.map(tile => `<button class="puzzle-tile" data-action="puzzle-add" data-tile-id="${tile.id}">${escapeHtml(tile.text)}</button>`).join("")}</div>
        ${selected.length ? `<button class="puzzle-clear" data-action="puzzle-undo">1つ戻す</button>` : ""}
      </div>`;
    }
    if (isExam || ["strict", "hint", "boss"].includes(mode)) {
      const hintText = settings.hintType === "group" ? Core.buildChoices(question, data.questions).join(" / ") : Core.hintFor(question.answer, settings.hintType);
      const hint = mode === "hint" ? `<div class="hint-box">ヒント: ${escapeHtml(hintText)}</div>` : "";
      const value = isExam ? session.responses[question.id] || "" : "";
      return `${hint}<form id="answer-form"><label for="answer-input" class="eyebrow">語句を入力</label><input id="answer-input" class="answer-input" name="answer" autocomplete="off" autocapitalize="off" value="${escapeHtml(value)}" aria-label="空欄の答え"></form>`;
    }
    const choices = session.choiceQuestionId === question.id ? session.choices : Core.buildChoices(question, data.questions);
    session.choiceQuestionId = question.id;
    session.choices = choices;
    return `<div class="choices">${choices.map(choice => `<button class="choice-button" data-action="choose" data-value="${escapeHtml(choice)}">${escapeHtml(choice)}</button>`).join("")}</div>`;
  }

  function renderStudyActions(mode, isExam) {
    if (session.feedback) return `<button class="primary-button" data-action="next-question">次へ</button>`;
    if (isExam) return `<button class="primary-button" type="submit" form="answer-form">${session.index + 1 === session.queue.length ? "提出する" : "保存して次へ"}</button>`;
    if (["strict", "hint", "boss"].includes(mode)) return `<button class="primary-button" type="submit" form="answer-form">判定する</button>`;
    if (mode === "puzzle") return `<button class="primary-button" data-action="puzzle-submit" ${session.puzzleSelected?.length ? "" : "disabled"}>判定する</button>`;
    return "";
  }

  function renderFeedback(question, feedback) {
    const context = Core.contextFor(question, 90);
    return `<div class="feedback ${feedback.correct ? "correct" : "wrong"}">
      <b>${feedback.correct ? `正解 +${feedback.xp}XP` : "不正解・数問後に再出題"}</b>
      ${feedback.correct ? "" : `正解：<strong>${escapeHtml(question.answer)}</strong>`}
      <div class="complete-text">${escapeHtml(context.before)}<strong>${escapeHtml(question.answer)}</strong>${escapeHtml(context.after)}</div>
    </div>`;
  }

  function modeName(mode) {
    return { choice: "意味つなぎ", puzzle: "復元パズル", hint: "ヒント入力", strict: "本番入力", boss: "章ボス", exam: "15分模試" }[mode] || "学習";
  }

  function submitStandardAnswer(value) {
    if (session.feedback) return;
    const question = currentQuestion();
    const mode = effectiveMode(question);
    const correct = Core.isAnswerCorrect(value, question);
    const xp = Core.calculateXp(mode, correct);
    applyProgress(question, correct, mode, xp);
    session.correct += correct ? 1 : 0;
    session.wrong += correct ? 0 : 1;
    session.xp += xp;
    session.answerLog.push({ question, value, correct });
    if (!correct) {
      session.mistakes.push({ question, value });
      session.queue = Core.enqueueRetry(session.queue, question, session.index);
    }
    session.feedback = { correct, xp };
    render();
  }

  function applyProgress(question, correct, mode, xp) {
    recordStudyDay();
    progress.items[question.id] = Core.updateItemProgress(progress.items[question.id], correct, mode);
    progress.xp += xp;
    if (correct) {
      progress.combo += 1;
      progress.bestCombo = Math.max(progress.bestCombo, progress.combo);
      progress.todayCorrect += 1;
      if ([3, 5, 10, 20].includes(progress.combo)) showToast(`${progress.combo}連続正解！`);
    } else {
      progress.combo = 0;
    }
    saveProgress();
  }

  function nextQuestion() {
    session.index += 1;
    session.feedback = null;
    session.selected = null;
    session.choiceQuestionId = null;
    session.choices = null;
    session.puzzleQuestionId = null;
    session.puzzleTiles = null;
    session.puzzleSelected = null;
    if (session.index >= session.queue.length) finishSession();
    else { render(); focusAnswerControl(); }
  }

  function submitExamResponse(value) {
    const question = currentQuestion();
    session.responses[question.id] = value;
    if (session.index + 1 >= session.queue.length) finishExam(false);
    else {
      session.index += 1;
      render();
      focusAnswerControl();
    }
  }

  function finishExam(timedOut) {
    stopTimer();
    session.correct = 0;
    session.wrong = 0;
    session.mistakes = [];
    for (const question of session.queue) {
      const value = session.responses[question.id] || "";
      const correct = Core.isAnswerCorrect(value, question);
      applyProgress(question, correct, "strict", Core.calculateXp("strict", correct));
      session.correct += correct ? 1 : 0;
      session.wrong += correct ? 0 : 1;
      if (!correct) session.mistakes.push({ question, value });
    }
    const record = { date: new Date().toISOString(), seed: session.seed, score: session.correct, total: session.queue.length, timedOut };
    progress.examHistory.unshift(record);
    progress.examHistory = progress.examHistory.slice(0, 20);
    saveProgress();
    session.timedOut = timedOut;
    currentView = "result";
    render();
  }

  function finishSession() {
    stopTimer();
    if (session?.mode === "boss") {
      const total = session.correct + session.wrong;
      const rate = total ? session.correct / total : 0;
      const stars = rate >= .9 ? 3 : rate >= .8 ? 2 : rate >= .6 ? 1 : 0;
      if (stars) progress.bossClears[session.chapterId] = { stars, rate, date: new Date().toISOString() };
      saveProgress();
    }
    currentView = "result";
    render();
  }

  function renderResult() {
    const total = session.correct + session.wrong;
    const rate = total ? Math.round((session.correct / total) * 100) : 0;
    const title = session.type === "exam" ? "本番模試終了" : session.mode === "boss" ? "章ボス終了" : "クエスト完了";
    app.innerHTML = `<section class="result-card">
      <p class="eyebrow">Session result</p><h1>${title}</h1>
      ${session.timedOut ? `<p class="exam-note">15分経過のため自動提出しました。</p>` : ""}
      <div class="result-score" style="--score:${rate}%"><strong>${rate}%</strong></div>
      <p class="lead">${session.correct}問正解 / ${session.wrong}問ミス${session.xp ? ` · +${session.xp}XP` : ""}</p>
      ${session.mode === "boss" ? `<p><b>${rate >= 80 ? "エリアクリア" : "80%以上でクリア"}</b></p>` : ""}
      ${renderMistakes()}
      <div class="button-row"><button class="primary-button" data-action="retry-mistakes">ミスだけ復習</button><button class="ghost-button" data-nav="home">トップへ戻る</button></div>
    </section>`;
  }

  function renderMistakes() {
    if (!session.mistakes?.length) return `<p class="feedback correct">全問正解です。</p>`;
    return `<h2>誤答一覧</h2><ul class="result-list">${session.mistakes.map(({ question, value }) => `<li><b>${question.articleNumber == null ? "概要" : question.articleNumber === 0 ? "前文" : `第${question.articleNumber}条`}：${escapeHtml(question.answer)}</b><br><small>入力：${escapeHtml(value || "（未入力）")} / PDF p.${question.sourcePage}</small></li>`).join("")}</ul>`;
  }

  function renderArticleSession() {
    const article = session.article;
    const blanks = article.segments.filter(item => item.type === "blank").map(item => data.questionById[item.blankId]);
    const hideHeading = !settings.showHeadings;
    app.innerHTML = `<div class="study-shell">
      <div class="page-header"><button class="back-button" data-nav="home">← 終了してトップへ</button><span class="study-chip">条文連続復元 · ${blanks.length}空欄</span></div>
      <article class="study-card">
        <div class="article-meta"><span class="article-label">第${article.articleNumber}条</span>${hideHeading ? "" : `<span>〔${escapeHtml(article.heading)}〕</span>`}</div>
        <form id="article-form"><div class="article-rebuild">${article.segments.map(segment => {
          if (segment.type === "text") return escapeHtml(segment.text);
          const value = session.values[segment.blankId] || "";
          const result = session.result?.[segment.blankId];
          return `<input class="inline-input ${result == null ? "" : result ? "correct" : "wrong"}" name="${segment.blankId}" value="${escapeHtml(value)}" aria-label="${segment.blankId}の答え" autocomplete="off">`;
        }).join("")}</div></form>
        ${session.result ? `<div class="feedback ${Object.values(session.result).every(Boolean) ? "correct" : "wrong"}"><b>${Object.values(session.result).filter(Boolean).length} / ${blanks.length} 正解</b>${Object.values(session.result).every(Boolean) ? "条文を完全復元しました。" : "赤い空欄を直して再挑戦できます。"}</div>` : ""}
        <div class="study-actions"><button class="primary-button" type="submit" form="article-form">一括判定</button><button class="ghost-button" data-action="new-article">別の条文</button></div>
      </article>
    </div>`;
  }

  function submitArticle(form) {
    const blanks = session.article.segments.filter(item => item.type === "blank").map(item => data.questionById[item.blankId]);
    const formData = new FormData(form);
    session.result = {};
    let allCorrect = true;
    for (const question of blanks) {
      const value = formData.get(question.id) || "";
      session.values[question.id] = value;
      const correct = Core.isAnswerCorrect(value, question);
      session.result[question.id] = correct;
      allCorrect = allCorrect && correct;
      applyProgress(question, correct, "article", 0);
    }
    if (allCorrect) {
      progress.xp += Core.calculateXp("article", true);
      saveProgress();
    }
    render();
    if (allCorrect) showToast("条文を完全復元しました");
  }

  function renderAnswers() {
    app.innerHTML = `<section class="panel">
      <div class="page-header"><div><p class="eyebrow">Verified answer key</p><h1>答え確認</h1><p class="lead">課題PDFの空欄と、公式条文との照合結果を確認できます。</p></div><button class="back-button" data-nav="home">トップへ</button></div>
      <div class="filters"><input id="answer-search" type="search" placeholder="条番号・語句・見出しで検索"><select id="answer-chapter"><option value="">全章</option>${data.chapters.map(chapter => `<option value="${chapter.id}">${escapeHtml(chapter.name)}</option>`).join("")}</select></div>
      <div id="answer-list" class="answer-list">${answerCards(data.questions)}</div>
    </section>`;
  }

  function answerCards(items) {
    if (!items.length) return `<p class="empty">該当する空欄はありません。</p>`;
    return items.map(item => {
      const context = Core.contextFor(item, 46);
      const label = item.articleNumber == null ? "概要" : item.articleNumber === 0 ? "前文" : `第${item.articleNumber}条`;
      return `<details class="answer-card"><summary>${escapeHtml(label)} · ${escapeHtml(context.before)}＿＿${escapeHtml(context.after)}</summary><p class="answer-value">正解：<b>${escapeHtml(item.answer)}</b></p><p>${escapeHtml(context.before)}<b>${escapeHtml(item.answer)}</b>${escapeHtml(context.after)}</p><span class="verified">公式条文照合済み · 課題PDF p.${item.sourcePage}</span></details>`;
    }).join("");
  }

  function filterAnswers() {
    const query = Core.normalizeAnswer(document.querySelector("#answer-search")?.value || "");
    const chapter = document.querySelector("#answer-chapter")?.value || "";
    const items = data.questions.filter(item => {
      const haystack = Core.normalizeAnswer(`${item.articleNumber ?? "概要"}${item.heading}${item.before}${item.answer}${item.after}`);
      return (!query || haystack.includes(query)) && (!chapter || item.chapterId === chapter);
    });
    document.querySelector("#answer-list").innerHTML = answerCards(items);
  }

  function renderSettings() {
    app.innerHTML = `<section class="panel settings-grid">
      <div class="page-header"><div><p class="eyebrow">Settings</p><h1>設定</h1></div><button class="back-button" data-nav="home">トップへ</button></div>
      <div class="setting-row"><div><b>条文の見出し</b><p>本番模試と章ボスでは常に非表示です。</p></div><input id="show-headings" class="switch" type="checkbox" ${settings.showHeadings ? "checked" : ""} aria-label="条文の見出しを表示"></div>
      <div class="setting-row"><div><b>入力ヒント</b><p>一部ヒント入力モードで使います。</p></div><select id="hint-type"><option value="first" ${settings.hintType === "first" ? "selected" : ""}>先頭1文字</option><option value="length" ${settings.hintType === "length" ? "selected" : ""}>文字数</option><option value="group" ${settings.hintType === "group" ? "selected" : ""}>語群</option><option value="both" ${settings.hintType === "both" ? "selected" : ""}>先頭 + 文字数</option><option value="none" ${settings.hintType === "none" ? "selected" : ""}>ヒントなし</option></select></div>
      <div class="setting-row"><div><b>アプリをインストール</b><p>オフラインでホーム画面から起動できます。</p></div><button id="install-button" class="secondary-button" data-action="install" ${deferredInstallPrompt ? "" : "disabled"}>インストール</button></div>
      <div class="setting-row"><div><b>進捗をリセット</b><p>このアプリのXP・弱点・模試履歴だけを初期化します。</p></div><button class="ghost-button danger-button" data-action="reset-progress">リセット</button></div>
      <p class="verified">保存キー: ${STORAGE_KEY}<br>既存の定期テスト用アプリとは共有しません。</p>
    </section>`;
  }

  function startTimer() {
    stopTimer();
    timerHandle = window.setInterval(() => {
      if (!session?.deadline) return;
      const remaining = session.deadline - Date.now();
      const timer = document.querySelector("#timer");
      if (timer) {
        timer.textContent = formatRemaining();
        timer.classList.toggle("danger", remaining < 60000);
      }
      if (remaining <= 0) {
        if (session.type === "exam") finishExam(true);
        else finishSession();
      }
    }, 500);
  }

  function stopTimer() {
    if (timerHandle) window.clearInterval(timerHandle);
    timerHandle = null;
  }

  function formatRemaining() {
    const seconds = Math.max(0, Math.ceil((session.deadline - Date.now()) / 1000));
    return `${String(Math.floor(seconds / 60)).padStart(2, "0")}:${String(seconds % 60).padStart(2, "0")}`;
  }

  function focusAnswerControl() {
    window.setTimeout(() => document.querySelector("#answer-input, .inline-input, .choice-button")?.focus(), 30);
  }

  function handleClick(event) {
    const nav = event.target.closest("[data-nav]");
    if (nav) return setView(nav.dataset.nav);
    const target = event.target.closest("[data-action]");
    if (!target) return;
    const action = target.dataset.action;
    if (action === "start-quest") startQuest({ count: Number(target.dataset.count || 10), mode: target.dataset.mode || "mixed", filter: target.dataset.filter || "", chapterId: target.dataset.chapter || "", durationMinutes: Number(target.dataset.minutes || 0) });
    else if (action === "start-boss") startBoss(target.dataset.chapter);
    else if (action === "start-exam") startExam();
    else if (action === "start-article") startArticleMode(target.dataset.chapter || "");
    else if (action === "choose") submitStandardAnswer(target.dataset.value);
    else if (action === "puzzle-add") {
      if (!session.puzzleSelected.includes(target.dataset.tileId)) session.puzzleSelected.push(target.dataset.tileId);
      render();
    }
    else if (action === "puzzle-undo") {
      session.puzzleSelected.pop();
      render();
    }
    else if (action === "puzzle-submit") {
      const value = session.puzzleSelected.map(id => session.puzzleTiles.find(tile => tile.id === id)?.text || "").join("");
      submitStandardAnswer(value);
    }
    else if (action === "next-question") nextQuestion();
    else if (action === "submit-exam") finishExam(false);
    else if (action === "retry-mistakes") {
      const pool = session.mistakes.map(item => item.question);
      if (!pool.length) return setView("home");
      session = { type: "quiz", mode: "strict", queue: pool, index: 0, feedback: null, correct: 0, wrong: 0, xp: 0, mistakes: [], answerLog: [], startedAt: Date.now() };
      currentView = "study"; render(); focusAnswerControl();
    }
    else if (action === "new-article") startArticleMode(session.article.chapterId);
    else if (action === "install" && deferredInstallPrompt) {
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(() => { deferredInstallPrompt = null; renderSettings(); });
    }
    else if (action === "reset-progress") {
      if (window.confirm("憲法クエストの進捗をリセットしますか？")) {
        localStorage.removeItem(STORAGE_KEY);
        progress = loadProgress();
        renderSettings();
        showToast("進捗をリセットしました");
      }
    }
  }

  function handleSubmit(event) {
    event.preventDefault();
    if (event.target.id === "answer-form") {
      const value = new FormData(event.target).get("answer") || "";
      if (session.type === "exam") submitExamResponse(value);
      else submitStandardAnswer(value);
    } else if (event.target.id === "article-form") submitArticle(event.target);
  }

  function handleChange(event) {
    if (event.target.id === "show-headings") { settings.showHeadings = event.target.checked; saveSettings(); }
    if (event.target.id === "hint-type") { settings.hintType = event.target.value; saveSettings(); }
    if (["answer-search", "answer-chapter"].includes(event.target.id)) filterAnswers();
  }

  function updateNetworkStatus() {
    const online = navigator.onLine;
    networkStatus.textContent = online ? "オンライン" : "オフライン";
    networkStatus.className = `status-pill ${online ? "online" : "offline"}`;
  }

  document.addEventListener("click", handleClick);
  document.addEventListener("submit", handleSubmit);
  document.addEventListener("input", event => { if (event.target.id === "answer-search") filterAnswers(); });
  document.addEventListener("change", handleChange);
  window.addEventListener("online", updateNetworkStatus);
  window.addEventListener("offline", updateNetworkStatus);
  window.addEventListener("beforeinstallprompt", event => { event.preventDefault(); deferredInstallPrompt = event; });

  updateNetworkStatus();
  loadData()
    .then(() => {
      render();
      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) navigator.serviceWorker.register("./service-worker.js");
    })
    .catch(error => {
      app.innerHTML = `<section class="loading-card"><h1>データを読み込めませんでした</h1><p>${escapeHtml(error.message)}</p><p>index.html、core.js、app.js、dataフォルダを同じ構成のまま配置してください。</p></section>`;
    });
})();

</script>
</body>
</html>
