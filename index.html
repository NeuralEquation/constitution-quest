}
.brand { display: flex; align-items: center; gap: .7rem; border: 0; background: transparent; color: var(--ink); text-align: left; padding: 0; }

main { width: min(1160px, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0 calc(5rem + env(safe-area-inset-bottom)); }

.loader { display: inline-block; width: 2.4rem; height: 2.4rem; border: 4px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.eyebrow { margin: 0 0 .5rem; color: var(--primary); font-weight: 900; letter-spacing: .14em; font-size: .76rem; text-transform: uppercase; }
h1, h2, h3, p { overflow-wrap: anywhere; }
h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 3.25rem); line-height: 1.16; letter-spacing: -.035em; }

.lead { color: var(--muted); line-height: 1.8; }

.hero-main, .panel, .metric, .chapter-card, .study-card, .result-card, .answer-card {

  box-shadow: var(--shadow);
}
.hero-main { position: relative; overflow: hidden; padding: clamp(1.5rem, 4vw, 3.3rem); background: linear-gradient(135deg, rgba(255,255,255,.98), rgba(238,242,255,.94)); }
.hero-main::after { content: "第九条"; position: absolute; right: -1rem; bottom: -1.6rem; color: rgba(67,56,202,.055); font-size: clamp(5rem, 15vw, 11rem); font-weight: 900; pointer-events: none; }
.hero-actions { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: .7rem; margin-top: 1.4rem; }
.primary-button, .secondary-button, .ghost-button, .choice-button {
  min-height: 3rem;
  border-radius: 14px;
  padding: .75rem 1rem;
  border: 1px solid transparent;
  font-weight: 800;
}
.primary-button { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); box-shadow: 0 9px 22px rgba(67,56,202,.24); }
.primary-button:hover { transform: translateY(-1px); }
.secondary-button { color: var(--primary-dark); border-color: var(--line); background: var(--primary-light); }
.ghost-button { color: var(--primary-dark); border-color: var(--line); background: white; }
.danger-button { color: var(--danger); border-color: #fecdd3; background: #fff1f2; }
.button-row { display: flex; flex-wrap: wrap; gap: .7rem; }
.quest-list { display: grid; gap: .65rem; padding: 1rem; }
.quest-button { display: grid; grid-template-columns: 2.4rem 1fr auto; align-items: center; gap: .7rem; padding: .8rem; border: 1px solid var(--line); border-radius: 16px; background: white; color: var(--ink); text-align: left; }
.quest-button:hover { border-color: #a5b4fc; background: #fafaff; }
.quest-icon { display: grid; place-items: center; width: 2.35rem; height: 2.35rem; border-radius: 12px; background: var(--primary-light); color: var(--primary); font-weight: 900; }
.quest-button small { color: var(--muted); }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: .8rem; margin-bottom: 1.8rem; }
.metric { padding: 1.1rem; box-shadow: 0 10px 25px rgba(49,46,129,.07); }
.metric strong { display: block; margin-top: .25rem; font-size: clamp(1.35rem, 3vw, 2rem); }
.metric span { color: var(--muted); font-size: .76rem; font-weight: 700; }
.section-heading { display: flex; align-items: end; justify-content: space-between; gap: 1rem; margin: 2rem 0 1rem; }
.section-heading p { margin: .35rem 0 0; color: var(--muted); }
.chapter-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .9rem; }
.chapter-card { padding: 1.15rem; box-shadow: 0 10px 25px rgba(49,46,129,.075); }
.chapter-top { display: flex; align-items: start; justify-content: space-between; gap: .8rem; }
.chapter-number { color: var(--primary); font-size: .72rem; font-weight: 900; }
.chapter-card h3 { margin-top: .2rem; font-size: 1.05rem; }
.chapter-card small { color: var(--muted); }
.progress-track { height: .52rem; margin: 1rem 0 .45rem; overflow: hidden; border-radius: 999px; background: #e2e8f0; }
.progress-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), #818cf8); }
.chapter-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: .75rem; }
.chapter-actions { display: flex; gap: .5rem; margin-top: .9rem; }

.page-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
.back-button { border: 0; background: transparent; color: var(--primary); font-weight: 800; padding: .5rem 0; }
.study-shell { max-width: 820px; margin: 0 auto; }
.study-status { display: grid; grid-template-columns: 1fr auto auto; gap: .75rem; align-items: center; margin-bottom: .75rem; }
.study-status .progress-track { margin: .35rem 0 0; }
.study-chip { padding: .5rem .7rem; border-radius: 12px; background: white; border: 1px solid var(--line); color: var(--muted); font-size: .75rem; font-weight: 800; }
.study-card { padding: clamp(1.1rem, 4vw, 2.2rem); }
.article-meta { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: 1rem; color: var(--muted); font-size: .76rem; font-weight: 700; }
.article-label { padding: .35rem .55rem; border-radius: 10px; color: var(--primary-dark); background: var(--primary-light); }
.question-text { margin: 1rem 0 1.4rem; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; font-size: clamp(1.05rem, 2.6vw, 1.38rem); line-height: 2; letter-spacing: .025em; }
.blank-mark { display: inline-block; min-width: 5.5rem; margin: 0 .2rem; padding: 0 .45rem; color: var(--primary); border-bottom: 3px solid var(--accent); background: #fff7ed; text-align: center; font-family: inherit; font-weight: 800; }
.choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .7rem; }
.choice-button { border-color: var(--line); background: white; color: var(--ink); text-align: left; }
.choice-button:hover { border-color: #818cf8; background: var(--surface-soft); }
.choice-button.selected { color: white; border-color: var(--primary); background: var(--primary); }
.puzzle-board { display: grid; gap: .85rem; }
.puzzle-answer { min-height: 3.8rem; padding: .85rem 1rem; border: 2px dashed #818cf8; border-radius: 15px; color: var(--primary-dark); background: var(--surface-soft); font-size: 1.15rem; font-weight: 800; letter-spacing: .08em; }
.puzzle-answer span { color: var(--muted); font-size: .95rem; font-weight: 600; letter-spacing: 0; }
.puzzle-tiles { display: flex; flex-wrap: wrap; gap: .6rem; }
.puzzle-tile { min-width: 3rem; min-height: 3rem; padding: .65rem .9rem; border: 1px solid #c7d2fe; border-radius: 12px; color: var(--ink); background: white; box-shadow: 0 4px 10px rgba(67,56,202,.08); font-weight: 800; }
.puzzle-tile:hover { border-color: var(--primary); transform: translateY(-1px); }
.puzzle-clear { justify-self: start; border: 0; color: var(--primary); background: transparent; font-weight: 800; text-decoration: underline; }
.answer-input { width: 100%; min-height: 3.6rem; padding: .8rem 1rem; border: 2px solid var(--line); border-radius: 15px; color: var(--ink); background: white; font-size: 1.05rem; }
.hint-box { display: inline-flex; gap: .5rem; margin: 0 0 .8rem; padding: .55rem .7rem; border-radius: 12px; color: #9a3412; background: #ffedd5; font-weight: 800; }
.feedback { margin-top: 1rem; padding: 1rem; border-radius: 16px; line-height: 1.7; }
.feedback.correct { color: #065f46; background: var(--success-soft); border: 1px solid #a7f3d0; }
.feedback.wrong { color: #9f1239; background: var(--danger-soft); border: 1px solid #fecdd3; }
.feedback b { display: block; margin-bottom: .25rem; }
.complete-text { margin-top: .6rem; color: var(--ink); font-family: "Yu Mincho", serif; }
.study-actions { display: flex; justify-content: flex-end; gap: .7rem; margin-top: 1rem; }
.exam-note { margin: .8rem 0; padding: .75rem; border-radius: 12px; color: #92400e; background: #fef3c7; }
.timer.danger { color: var(--danger); background: var(--danger-soft); }

.result-card { max-width: 720px; margin: 2rem auto; padding: clamp(1.4rem, 5vw, 3rem); text-align: center; }
.result-score { display: grid; place-items: center; width: 9rem; height: 9rem; margin: 1.4rem auto; border-radius: 50%; color: white; background: conic-gradient(var(--accent) var(--score), var(--primary) 0); box-shadow: 0 16px 35px rgba(67,56,202,.22); }
.result-score strong { display: grid; place-items: center; width: 7rem; height: 7rem; border-radius: 50%; background: var(--primary-dark); font-size: 2rem; }
.result-list { max-height: 24rem; overflow: auto; margin: 1rem 0; padding: 0; list-style: none; text-align: left; }

.panel { padding: clamp(1rem, 3vw, 1.6rem); }
.filters { display: grid; grid-template-columns: 1fr 220px; gap: .7rem; margin: 1rem 0; }

.answer-card { padding: 1rem; box-shadow: none; }
.answer-card summary { cursor: pointer; font-weight: 800; }
.answer-card p { color: var(--muted); line-height: 1.75; }
.answer-value { color: var(--primary-dark); font-size: 1.15rem; }

.settings-grid { display: grid; gap: 1rem; max-width: 720px; }
.setting-row { display: grid; grid-template-columns: 1fr minmax(180px, 240px); gap: 1rem; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--line); }
.setting-row p { margin: .25rem 0 0; color: var(--muted); }

.switch::after { content: ""; position: absolute; top: .2rem; left: .2rem; width: 1.4rem; height: 1.4rem; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,.2); transition: .2s; }
.switch:checked { background: var(--primary); }
.switch:checked::after { transform: translateX(1.4rem); }
.article-rebuild { line-height: 2.4; font-family: "Yu Mincho", serif; }
.inline-input { min-width: 7rem; max-width: 14rem; margin: .25rem; padding: .45rem .6rem; border: 2px solid var(--line); border-radius: 10px; background: white; }
.inline-input.correct { border-color: var(--success); background: var(--success-soft); }
.inline-input.wrong { border-color: var(--danger); background: var(--danger-soft); }
.toast { position: fixed; left: 50%; bottom: calc(1rem + env(safe-area-inset-bottom)); z-index: 50; max-width: min(90vw, 520px); padding: .8rem 1rem; border-radius: 14px; color: white; background: var(--primary-dark); box-shadow: var(--shadow); opacity: 0; transform: translate(-50%, 1rem); pointer-events: none; transition: .25s; }
.toast.show { opacity: 1; transform: translate(-50%, 0); }
.empty { padding: 2rem; color: var(--muted); text-align: center; }

@media (max-width: 820px) {
  .hero { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .chapter-grid { grid-template-columns: repeat(2, 1fr); }
  .status-pill { display: none; }
}
@media (max-width: 560px) {
  main { width: min(100% - 1rem, 1160px); padding-top: 1rem; }
  .site-header { padding: .65rem .75rem; }
  .brand small { display: none; }
  .hero-main { padding: 1.25rem; }
  .hero-actions, .button-row { flex-direction: column; }
  .hero-actions button, .button-row button { width: 100%; }
  .chapter-grid, .choices, .filters { grid-template-columns: 1fr; }
  .chapter-card { padding: 1rem; }
  .study-status { grid-template-columns: 1fr auto; }
  .study-status > :first-child { grid-column: 1 / -1; }
  .question-text { line-height: 1.85; }
  .study-actions { position: sticky; bottom: calc(.5rem + env(safe-area-inset-bottom)); padding: .55rem; border-radius: 16px; background: rgba(255,255,255,.94); box-shadow: 0 8px 28px rgba(49,46,129,.15); }
  .study-actions button { flex: 1; }
  .setting-row { grid-template-columns: 1fr; }
  .setting-row > :last-child { justify-self: stretch; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

:"天皇は、この憲法の定める"},{"type":"blank","blankId":"article-4-b1"},{"type":"text","text":"に関する行為のみを行ひ、"},{"type":"blank","blankId":"article-4-b2"},{"type":"text","text":"に関する権能を有しない。2天皇は、"},{"type":"blank","blankId":"article-4-b3"},{"type":"text","text":"の定めるところにより、その"},{"type":"blank","blankId":"article-4-b4"},{"type":"text","text":"に関する行為を委任することができる。"}],"normalizedBodyText":"天皇は、この憲法の定める国事に関する行為のみを行ひ、国政に関する権能を有しない。2天皇は、法律の定めるところにより、その国事に関する行為を委任することができる。","sourcePages":[2]},{"id":"article-5","articleNumber":5,"chapterId":"emperor","chapterTitle":"第一章 天皇","heading":"摂政","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五条 皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名でその国事に関する行為を行ふ。この場合には、前条第一項の規定を準用する。","normalizedText":"第五条皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名でその国事に関する行為を行ふ。この場合には、前条第一項の規定を準用する。","segments":[{"type":"blank","blankId":"article-5-b1"},{"type":"text","text":"の定めるところにより摂政を置くときは、摂政は、天皇の名でその"},{"type":"blank","blankId":"article-5-b2"},{"type":"text","text":"に関する行為を行ふ。この場合には、前条第一項の規定を準用する。"}],"normalizedBodyText":"皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名でその国事に関する行為を行ふ。この場合には、前条第一項の規定を準用する。","sourcePages":[3]},{"id":"article-6","articleNumber":6,"chapterId":"emperor","chapterTitle":"第一章 天皇","heading":"天皇の任命行為","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六条 天皇は、国会の指名に基いて、内閣総理大臣を任命する。 2 天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命する。","normalizedText":"第六条天皇は、国会の指名に基いて、内閣総理大臣を任命する。2天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命する。","segments":[{"type":"text","text":"天皇は、"},{"type":"blank","blankId":"article-6-b1"},{"type":"text","text":"の指名に基いて、"},{"type":"blank","blankId":"article-6-b2"},{"type":"text","text":"を任命する。2天皇は、"},{"type":"blank","blankId":"article-6-b3"},{"type":"text","text":"の指名に基いて、"},{"type":"blank","blankId":"article-6-b4"},{"type":"text","text":"の長たる裁判官を任命する。"}],"normalizedBodyText":"天皇は、国会の指名に基いて、内閣総理大臣を任命する。2天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命する。","sourcePages":[3]},{"id":"article-7","articleNumber":7,"chapterId":"emperor","chapterTitle":"第一章 天皇","heading":"天皇の国事行為","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七条 天皇は、内閣の助言と承認により、国民のために、左の国事に関する行為を行ふ。 一 憲法改正、法律、政令及び条約を公布すること。 二 国会を召集すること。 三 衆議院を解散すること。 四 国会議員の総選挙の施行を公示すること。 五 国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を認証すること。 六 大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。 七 栄典を授与すること。 八 批准書及び法律の定めるその他の外交文書を認証すること。 九 外国の大使及び公使を接受すること。 十 儀式を行ふこと。","normalizedText":"第七条天皇は、内閣の助言と承認により、国民のために、左の国事に関する行為を行ふ。一憲法改正、法律、政令及び条約を公布すること。二国会を召集すること。三衆議院を解散すること。四国会議員の総選挙の施行を公示すること。五国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を認証すること。六大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。七栄典を授与すること。八批准書及び法律の定めるその他の外交文書を認証すること。九外国の大使及び公使を接受すること。十儀式を行ふこと。","segments":[{"type":"text","text":"天皇は、"},{"type":"blank","blankId":"article-7-b1"},{"type":"text","text":"の助言と承認により、国民のために、左の"},{"type":"blank","blankId":"article-7-b2"},{"type":"text","text":"に関する行為を行ふ。一憲法改正、法律、"},{"type":"blank","blankId":"article-7-b3"},{"type":"text","text":"及び条約を"},{"type":"blank","blankId":"article-7-b4"},{"type":"text","text":"すること。二国会を"},{"type":"blank","blankId":"article-7-b5"},{"type":"text","text":"すること。三衆議院を"},{"type":"blank","blankId":"article-7-b6"},{"type":"text","text":"すること。四国会議員の総選挙の施行を公示すること。五国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を"},{"type":"blank","blankId":"article-7-b7"},{"type":"text","text":"すること。六大赦、特赦、減刑、刑の執行の免除及び復権を"},{"type":"blank","blankId":"article-7-b8"},{"type":"text","text":"すること。七栄典を授与すること。八批准書及び法律の定めるその他の外交文書を"},{"type":"blank","blankId":"article-7-b9"},{"type":"text","text":"すること。九外国の大使及び公使を接受すること。十儀式を行ふこと。"}],"normalizedBodyText":"天皇は、内閣の助言と承認により、国民のために、左の国事に関する行為を行ふ。一憲法改正、法律、政令及び条約を公布すること。二国会を召集すること。三衆議院を解散すること。四国会議員の総選挙の施行を公示すること。五国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を認証すること。六大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。七栄典を授与すること。八批准書及び法律の定めるその他の外交文書を認証すること。九外国の大使及び公使を接受すること。十儀式を行ふこと。","sourcePages":[3]},{"id":"article-8","articleNumber":8,"chapterId":"emperor","chapterTitle":"第一章 天皇","heading":"財産授受の制限","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八条 皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、国会の議決に基かなければならない。","normalizedText":"第八条皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、国会の議決に基かなければならない。","segments":[{"type":"text","text":"皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、"},{"type":"blank","blankId":"article-8-b1"},{"type":"text","text":"の議決に基かなければならない。"}],"normalizedBodyText":"皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、国会の議決に基かなければならない。","sourcePages":[3]},{"id":"article-9","articleNumber":9,"chapterId":"pacifism","chapterTitle":"第二章 戦争の放棄","heading":"戦争の放棄と戦力及び交戦権の否認","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第九条 日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる戦争と、武力による威嚇又は武力の行使は、国際紛争を解決する手段としては、永久にこれを放棄する。 2 前項の目的を達するため、陸海空軍その他の戦力は、これを保持しない。国の交戦権は、これを認めない。","normalizedText":"第九条日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる戦争と、武力による威嚇又は武力の行使は、国際紛争を解決する手段としては、永久にこれを放棄する。2前項の目的を達するため、陸海空軍その他の戦力は、これを保持しない。国の交戦権は、これを認めない。","segments":[{"type":"text","text":"日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる"},{"type":"blank","blankId":"article-9-b1"},{"type":"text","text":"と、"},{"type":"blank","blankId":"article-9-b2"},{"type":"text","text":"による威嚇又は"},{"type":"blank","blankId":"article-9-b3"},{"type":"text","text":"の行使は、"},{"type":"blank","blankId":"article-9-b4"},{"type":"text","text":"を解決する手段としては、永久にこれを放棄する。2前項の目的を達するため、"},{"type":"blank","blankId":"article-9-b5"},{"type":"text","text":"その他の"},{"type":"blank","blankId":"article-9-b6"},{"type":"text","text":"は、これを保持しない。国の"},{"type":"blank","blankId":"article-9-b7"},{"type":"text","text":"は、これを認めない。"}],"normalizedBodyText":"日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる戦争と、武力による威嚇又は武力の行使は、国際紛争を解決する手段としては、永久にこれを放棄する。2前項の目的を達するため、陸海空軍その他の戦力は、これを保持しない。国の交戦権は、これを認めない。","sourcePages":[3]},{"id":"article-10","articleNumber":10,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"国民たる要件","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十条 日本国民たる要件は、法律でこれを定める。","normalizedText":"第十条日本国民たる要件は、法律でこれを定める。","segments":[{"type":"text","text":"日本国民たる要件は、"},{"type":"blank","blankId":"article-10-b1"},{"type":"text","text":"でこれを定める。"}],"normalizedBodyText":"日本国民たる要件は、法律でこれを定める。","sourcePages":[3]},{"id":"article-11","articleNumber":11,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"基本的人権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十一条 国民は、すべての基本的人権の享有を妨げられない。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利として、現在及び将来の国民に与へられる。","normalizedText":"第十一条国民は、すべての基本的人権の享有を妨げられない。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利として、現在及び将来の国民に与へられる。","segments":[{"type":"text","text":"国民は、すべての"},{"type":"blank","blankId":"article-11-b1"},{"type":"text","text":"の享有を妨げられない。この憲法が国民に保障する"},{"type":"blank","blankId":"article-11-b2"},{"type":"text","text":"は、侵すことのできない"},{"type":"blank","blankId":"article-11-b3"},{"type":"text","text":"として、"},{"type":"blank","blankId":"article-11-b4"},{"type":"text","text":"の国民に与へられる。"}],"normalizedBodyText":"国民は、すべての基本的人権の享有を妨げられない。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利として、現在及び将来の国民に与へられる。","sourcePages":[3]},{"id":"article-12","articleNumber":12,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"自由及び権利の保持義務と公共福祉性","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十二条 この憲法が国民に保障する自由及び権利は、国民の不断の努力によつて、これを保持しなければならない。又、国民は、これを濫用してはならないのであつて、常に公共の福祉のためにこれを利用する責任を負ふ。","normalizedText":"第十二条この憲法が国民に保障する自由及び権利は、国民の不断の努力によつて、これを保持しなければならない。又、国民は、これを濫用してはならないのであつて、常に公共の福祉のためにこれを利用する責任を負ふ。","segments":[{"type":"text","text":"この憲法が国民に保障する自由及び権利は、国民の"},{"type":"blank","blankId":"article-12-b1"},{"type":"text","text":"によつて、これを保持しなければならない。又、国民は、これを"},{"type":"blank","blankId":"article-12-b2"},{"type":"text","text":"してはならないのであつて、常に"},{"type":"blank","blankId":"article-12-b3"},{"type":"text","text":"のためにこれを利用する責任を負ふ。"}],"normalizedBodyText":"この憲法が国民に保障する自由及び権利は、国民の不断の努力によつて、これを保持しなければならない。又、国民は、これを濫用してはならないのであつて、常に公共の福祉のためにこれを利用する責任を負ふ。","sourcePages":[3]},{"id":"article-13","articleNumber":13,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"個人の尊重と公共の福祉","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十三条 すべて国民は、個人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公共の福祉に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。","normalizedText":"第十三条すべて国民は、個人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公共の福祉に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。","segments":[{"type":"text","text":"すべて国民は、"},{"type":"blank","blankId":"article-13-b1"},{"type":"text","text":"として尊重される。"},{"type":"blank","blankId":"article-13-b2"},{"type":"text","text":"、自由及び"},{"type":"blank","blankId":"article-13-b3"},{"type":"text","text":"に対する国民の権利については、"},{"type":"blank","blankId":"article-13-b4"},{"type":"text","text":"に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。"}],"normalizedBodyText":"すべて国民は、個人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公共の福祉に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。","sourcePages":[3]},{"id":"article-14","articleNumber":14,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"平等原則、貴族制度の否認及び栄典の限界","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十四条 すべて国民は、法の下に平等であつて、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。 2 華族その他の貴族の制度は、これを認めない。 3 栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。","normalizedText":"第十四条すべて国民は、法の下に平等であつて、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。2華族その他の貴族の制度は、これを認めない。3栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。","segments":[{"type":"text","text":"すべて国民は、法の下に"},{"type":"blank","blankId":"article-14-b1"},{"type":"text","text":"であつて、人種、"},{"type":"blank","blankId":"article-14-b2"},{"type":"text","text":"、性別、社会的身分又は"},{"type":"blank","blankId":"article-14-b3"},{"type":"text","text":"により、"},{"type":"blank","blankId":"article-14-b4"},{"type":"text","text":"的、経済的又は社会的関係において、差別されない。2華族その他の貴族の制度は、これを認めない。3栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。"}],"normalizedBodyText":"すべて国民は、法の下に平等であつて、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。2華族その他の貴族の制度は、これを認めない。3栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。","sourcePages":[4]},{"id":"article-15","articleNumber":15,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"公務員の選定罷免権、公務員の本質、普通選挙の保障及び投票秘密の保障","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十五条 公務員を選定し、及びこれを罷免することは、国民固有の権利である。 2 すべて公務員は、全体の奉仕者であつて、一部の奉仕者ではない。 3 公務員の選挙については、成年者による普通選挙を保障する。 4 すべて選挙における投票の秘密は、これを侵してはならない。選挙人は、その選択に関し公的にも私的にも責任を問はれない。","normalizedText":"第十五条公務員を選定し、及びこれを罷免することは、国民固有の権利である。2すべて公務員は、全体の奉仕者であつて、一部の奉仕者ではない。3公務員の選挙については、成年者による普通選挙を保障する。4すべて選挙における投票の秘密は、これを侵してはならない。選挙人は、その選択に関し公的にも私的にも責任を問はれない。","segments":[{"type":"text","text":"公務員を"},{"type":"blank","blankId":"article-15-b1"},{"type":"text","text":"し、及びこれを"},{"type":"blank","blankId":"article-15-b2"},{"type":"text","text":"することは、国民固有の権利である。2すべて公務員は、"},{"type":"blank","blankId":"article-15-b3"},{"type":"text","text":"であつて、一部の奉仕者ではない。3公務員の選挙については、成年者による"},{"type":"blank","blankId":"article-15-b4"},{"type":"text","text":"を保障する。4すべて選挙における"},{"type":"blank","blankId":"article-15-b5"},{"type":"text","text":"の秘密は、これを侵してはならない。選挙人は、その選択に関し公的にも私的にも責任を問はれない。"}],"normalizedBodyText":"公務員を選定し、及びこれを罷免することは、国民固有の権利である。2すべて公務員は、全体の奉仕者であつて、一部の奉仕者ではない。3公務員の選挙については、成年者による普通選挙を保障する。4すべて選挙における投票の秘密は、これを侵してはならない。選挙人は、その選択に関し公的にも私的にも責任を問はれない。","sourcePages":[4]},{"id":"article-16","articleNumber":16,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"請願権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十六条 何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、廃止又は改正その他の事項に関し、平穏に請願する権利を有し、何人も、かかる請願をしたためにいかなる差別待遇も受けない。","normalizedText":"第十六条何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、廃止又は改正その他の事項に関し、平穏に請願する権利を有し、何人も、かかる請願をしたためにいかなる差別待遇も受けない。","segments":[{"type":"text","text":"何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、廃止又は改正その他の事項に関し、平穏に"},{"type":"blank","blankId":"article-16-b1"},{"type":"text","text":"する権利を有し、何人も、かかる"},{"type":"blank","blankId":"article-16-b2"},{"type":"text","text":"をしたためにいかなる差別待遇も受けない。"}],"normalizedBodyText":"何人も、損害の救済、公務員の罷免、法律、命令又は規則の制定、廃止又は改正その他の事項に関し、平穏に請願する権利を有し、何人も、かかる請願をしたためにいかなる差別待遇も受けない。","sourcePages":[4]},{"id":"article-17","articleNumber":17,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"公務員の不法行為による損害の賠償","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十七条 何人も、公務員の不法行為により、損害を受けたときは、法律の定めるところにより、国又は公共団体に、その賠償を求めることができる。","normalizedText":"第十七条何人も、公務員の不法行為により、損害を受けたときは、法律の定めるところにより、国又は公共団体に、その賠償を求めることができる。","segments":[{"type":"text","text":"何人も、公務員の"},{"type":"blank","blankId":"article-17-b1"},{"type":"text","text":"により、損害を受けたときは、法律の定めるところにより、国又は公共団体に、その"},{"type":"blank","blankId":"article-17-b2"},{"type":"text","text":"を求めることができる。"}],"normalizedBodyText":"何人も、公務員の不法行為により、損害を受けたときは、法律の定めるところにより、国又は公共団体に、その賠償を求めることができる。","sourcePages":[4]},{"id":"article-18","articleNumber":18,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"奴隷的拘束及び苦役の禁止","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十八条 何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する苦役に服させられない。","normalizedText":"第十八条何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する苦役に服させられない。","segments":[{"type":"text","text":"何人も、いかなる"},{"type":"blank","blankId":"article-18-b1"},{"type":"text","text":"も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する"},{"type":"blank","blankId":"article-18-b2"},{"type":"text","text":"に服させられない。"}],"normalizedBodyText":"何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する苦役に服させられない。","sourcePages":[4]},{"id":"article-19","articleNumber":19,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"思想及び良心の自由","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第十九条 思想及び良心の自由は、これを侵してはならない。","normalizedText":"第十九条思想及び良心の自由は、これを侵してはならない。","segments":[{"type":"blank","blankId":"article-19-b1"},{"type":"text","text":"及び良心の自由は、これを侵してはならない。"}],"normalizedBodyText":"思想及び良心の自由は、これを侵してはならない。","sourcePages":[4]},{"id":"article-20","articleNumber":20,"chapterId":"rights-1","chapterTitle":"第三章 国民の権利及び義務","heading":"信教の自由","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十条 信教の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から特権を受け、又は政治上の権力を行使してはならない。 2 何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。 3 国及びその機関は、宗教教育その他いかなる宗教的活動もしてはならない。","normalizedText":"第二十条信教の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から特権を受け、又は政治上の権力を行使してはならない。2何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。3国及びその機関は、宗教教育その他いかなる宗教的活動もしてはならない。","segments":[{"type":"blank","blankId":"article-20-b1"},{"type":"text","text":"の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から"},{"type":"blank","blankId":"article-20-b2"},{"type":"text","text":"を受け、又は"},{"type":"blank","blankId":"article-20-b3"},{"type":"text","text":"上の権力を行使してはならない。2何人も、宗教上の行為、祝典、儀式又は行事に参加することを"},{"type":"blank","blankId":"article-20-b4"},{"type":"text","text":"されない。3国及びその機関は、"},{"type":"blank","blankId":"article-20-b5"},{"type":"text","text":"その他いかなる"},{"type":"blank","blankId":"article-20-b6"},{"type":"text","text":"もしてはならない。"}],"normalizedBodyText":"信教の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から特権を受け、又は政治上の権力を行使してはならない。2何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。3国及びその機関は、宗教教育その他いかなる宗教的活動もしてはならない。","sourcePages":[4]},{"id":"article-21","articleNumber":21,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"集会、結社及び表現の自由と通信秘密の保護","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十一条 集会、結社及び言論、出版その他一切の表現の自由は、これを保障する。 2 検閲は、これをしてはならない。通信の秘密は、これを侵してはならない。","normalizedText":"第二十一条集会、結社及び言論、出版その他一切の表現の自由は、これを保障する。2検閲は、これをしてはならない。通信の秘密は、これを侵してはならない。","segments":[{"type":"text","text":"集会、結社及び言論、出版その他一切の"},{"type":"blank","blankId":"article-21-b1"},{"type":"text","text":"は、これを保障する。2"},{"type":"blank","blankId":"article-21-b2"},{"type":"text","text":"は、これをしてはならない。"},{"type":"blank","blankId":"article-21-b3"},{"type":"text","text":"は、これを侵してはならない。"}],"normalizedBodyText":"集会、結社及び言論、出版その他一切の表現の自由は、これを保障する。2検閲は、これをしてはならない。通信の秘密は、これを侵してはならない。","sourcePages":[4]},{"id":"article-22","articleNumber":22,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"居住、移転、職業選択、外国移住及び国籍離脱の自由","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十二条 何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自由を有する。 2 何人も、外国に移住し、又は国籍を離脱する自由を侵されない。","normalizedText":"第二十二条何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自由を有する。2何人も、外国に移住し、又は国籍を離脱する自由を侵されない。","segments":[{"type":"text","text":"何人も、"},{"type":"blank","blankId":"article-22-b1"},{"type":"text","text":"に反しない限り、"},{"type":"blank","blankId":"article-22-b2"},{"type":"text","text":"、移転及び"},{"type":"blank","blankId":"article-22-b3"},{"type":"text","text":"の自由を有する。2何人も、"},{"type":"blank","blankId":"article-22-b4"},{"type":"text","text":"に移住し、又は"},{"type":"blank","blankId":"article-22-b5"},{"type":"text","text":"を離脱する自由を侵されない。"}],"normalizedBodyText":"何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自由を有する。2何人も、外国に移住し、又は国籍を離脱する自由を侵されない。","sourcePages":[4]},{"id":"article-23","articleNumber":23,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"学問の自由","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十三条 学問の自由は、これを保障する。","normalizedText":"第二十三条学問の自由は、これを保障する。","segments":[{"type":"blank","blankId":"article-23-b1"},{"type":"text","text":"の自由は、これを保障する。"}],"normalizedBodyText":"学問の自由は、これを保障する。","sourcePages":[4]},{"id":"article-24","articleNumber":24,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"家族関係における個人の尊厳と両性の平等","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十四条 婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。 2 配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。","normalizedText":"第二十四条婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。2配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。","segments":[{"type":"text","text":"婚姻は、"},{"type":"blank","blankId":"article-24-b1"},{"type":"text","text":"のみに基いて成立し、夫婦が"},{"type":"blank","blankId":"article-24-b2"},{"type":"text","text":"の権利を有することを基本として、相互の協力により、維持されなければならない。2配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。"}],"normalizedBodyText":"婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。2配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。","sourcePages":[4]},{"id":"article-25","articleNumber":25,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"生存権及び国民生活の社会的進歩向上に努める国の義務","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十五条 すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。 2 国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。","normalizedText":"第二十五条すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。2国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。","segments":[{"type":"text","text":"すべて国民は、"},{"type":"blank","blankId":"article-25-b1"},{"type":"text","text":"の生活を営む権利を有する。2国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。"}],"normalizedBodyText":"すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。2国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。","sourcePages":[5]},{"id":"article-26","articleNumber":26,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"教育を受ける権利と受けさせる義務","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十六条 すべて国民は、法律の定めるところにより、その能力に応じて、ひとしく教育を受ける権利を有する。 2 すべて国民は、法律の定めるところにより、その保護する子女に普通教育を受けさせる義務を負ふ。義務教育は、これを無償とする。","normalizedText":"第二十六条すべて国民は、法律の定めるところにより、その能力に応じて、ひとしく教育を受ける権利を有する。2すべて国民は、法律の定めるところにより、その保護する子女に普通教育を る。","sourcePages":[5]},{"id":"article-29","articleNumber":29,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"財産権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第二十九条 財産権は、これを侵してはならない。 2 財産権の内容は、公共の福祉に適合するやうに、法律でこれを定める。 3 私有財産は、正当な補償の下に、これを公共のために用ひることができる。","normalizedText":"第二十九条財産権は、これを侵してはならない。2財産権の内容は、公共の福祉に適合するやうに、法律でこれを定める。3私有財産は、正当な補償の下に、これを公共のために用ひることができる。","segments":[{"type":"text","text":"財産権は、これを侵してはならない。2財産権の内容は、"},{"type":"blank","blankId":"article-29-b1"},{"type":"text","text":"に適合するやうに、法律でこれを定める。3私有財産は、"},{"type":"blank","blankId":"article-29-b2"},{"type":"text","text":"の下に、これを"},{"type":"blank","blankId":"article-29-b3"},{"type":"text","text":"のために用ひることができる。"}],"normalizedBodyText":"財産権は、これを侵してはならない。2財産権の内容は、公共の福祉に適合するやうに、法律でこれを定める。3私有財産は、正当な補償の下に、これを公共のために用ひることができる。","sourcePages":[5]},{"id":"article-30","articleNumber":30,"chapterId":"rights-2","chapterTitle":"第三章 国民の権利及び義務","heading":"納税の義務","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十条 国民は、法律の定めるところにより、納税の義務を負ふ。","normalizedText":"第三十条国民は、法律の定めるところにより、納税の義務を負ふ。","segments":[{"type":"text","text":"国民は、法律の定めるところにより、"},{"type":"blank","blankId":"article-30-b1"},{"type":"text","text":"の義務を負ふ。"}],"normalizedBodyText":"国民は、法律の定めるところにより、納税の義務を負ふ。","sourcePages":[5]},{"id":"article-31","articleNumber":31,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"生命及び自由の保障と科刑の制約","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十一条 何人も、法律の定める手続によらなければ、その生命若しくは自由を奪はれ、又はその他の刑罰を科せられない。","normalizedText":"第三十一条何人も、法律の定める手続によらなければ、その生命若しくは自由を奪はれ、又はその他の刑罰を科せられない。","segments":[{"type":"text","text":"何人も、"},{"type":"blank","blankId":"article-31-b1"},{"type":"text","text":"の定める手続によらなければ、その"},{"type":"blank","blankId":"article-31-b2"},{"type":"text","text":"若しくは"},{"type":"blank","blankId":"article-31-b3"},{"type":"text","text":"を奪はれ、又はその他の刑罰を科せられない。"}],"normalizedBodyText":"何人も、法律の定める手続によらなければ、その生命若しくは自由を奪はれ、又はその他の刑罰を科せられない。","sourcePages":[5]},{"id":"article-32","articleNumber":32,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"裁判を受ける権利","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十二条 何人も、裁判所において裁判を受ける権利を奪はれない。","normalizedText":"第三十二条何人も、裁判所において裁判を受ける権利を奪はれない。","segments":[{"type":"text","text":"何人も、裁判所において"},{"type":"blank","blankId":"article-32-b1"},{"type":"text","text":"を受ける権利を奪はれない。"}],"normalizedBodyText":"何人も、裁判所において裁判を受ける権利を奪はれない。","sourcePages":[5]},{"id":"article-33","articleNumber":33,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"逮捕の制約","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十三条 何人も、現行犯として逮捕される場合を除いては、権限を有する司法官憲が発し、且つ理由となつてゐる犯罪を明示する令状によらなければ、逮捕されない。","normalizedText":"第三十三条何人も、現行犯として逮捕される場合を除いては、権限を有する司法官憲が発し、且つ理由となつてゐる犯罪を明示する令状によらなければ、逮捕されない。","segments":[{"type":"text","text":"何人も、"},{"type":"blank","blankId":"article-33-b1"},{"type":"text","text":"として逮捕される場合を除いては、権限を有する"},{"type":"blank","blankId":"article-33-b2"},{"type":"text","text":"が発し、且つ理由となつてゐる犯罪を明示する"},{"type":"blank","blankId":"article-33-b3"},{"type":"text","text":"によらなければ、逮捕されない。"}],"normalizedBodyText":"何人も、現行犯として逮捕される場合を除いては、権限を有する司法官憲が発し、且つ理由となつてゐる犯罪を明示する令状によらなければ、逮捕されない。","sourcePages":[5]},{"id":"article-34","articleNumber":34,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"抑留及び拘禁の制約","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十四条 何人も、理由を直ちに告げられ、且つ、直ちに弁護人に依頼する権利を与へられなければ、抑留又は拘禁されない。又、何人も、正当な理由がなければ、拘禁されず、要求があれば、その理由は、直ちに本人及びその弁護人の出席する公開の法廷で示されなければならない。","normalizedText":"第三十四条何人も、理由を直ちに告げられ、且つ、直ちに弁護人に依頼する権利を与へられなければ、抑留又は拘禁されない。又、何人も、正当な理由がなければ、拘禁されず、要求があれば、その理由は、直ちに本人及びその弁護人の出席する公開の法廷で示されなければならない。","segments":[{"type":"text","text":"何人も、理由を直ちに告げられ、且つ、直ちに"},{"type":"blank","blankId":"article-34-b1"},{"type":"text","text":"に依頼する権利を与へられなければ、"},{"type":"blank","blankId":"article-34-b2"},{"type":"text","text":"又は"},{"type":"blank","blankId":"article-34-b3"},{"type":"text","text":"されない。又、何人も、正当な理由がなければ、拘禁されず、要求があれば、その理由は、直ちに本人及びその"},{"type":"blank","blankId":"article-34-b4"},{"type":"text","text":"の出席する公開の法廷で示されなければならない。"}],"normalizedBodyText":"何人も、理由を直ちに告げられ、且つ、直ちに弁護人に依頼する権利を与へられなければ、抑留又は拘禁されない。又、何人も、正当な理由がなければ、拘禁されず、要求があれば、その理由は、直ちに本人及びその弁護人の出席する公開の法廷で示されなければならない。","sourcePages":[5]},{"id":"article-35","articleNumber":35,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"侵入、捜索及び押収の制約","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十五条 何人も、その住居、書類及び所持品について、侵入、捜索及び押収を受けることのない権利は、第三十三条の場合を除いては、正当な理由に基いて発せられ、且つ捜索する場所及び押収する物を明示する令状がなければ、侵されない。 2 捜索又は押収は、権限を有する司法官憲が発する各別の令状により、これを行ふ。","normalizedText":"第三十五条何人も、その住居、書類及び所持品について、侵入、捜索及び押収を受けることのない権利は、第三十三条の場合を除いては、正当な理由に基いて発せられ、且つ捜索する場所及び押収する物を明示する令状がなければ、侵されない。2捜索又は押収は、権限を有する司法官憲が発する各別の令状により、これを行ふ。","segments":[{"type":"text","text":"何人も、その住居、書類及び所持品について、侵入、捜索及び押収を受けることのない権利は、第三十三条の場合を除いては、正当な理由に基いて発せられ、且つ捜索する場所及び押収する物を明示する"},{"type":"blank","blankId":"article-35-b1"},{"type":"text","text":"がなければ、侵されない。2捜索又は押収は、権限を有する"},{"type":"blank","blankId":"article-35-b2"},{"type":"text","text":"が発する各別の"},{"type":"blank","blankId":"article-35-b3"},{"type":"text","text":"により、これを行ふ。"}],"normalizedBodyText":"何人も、その住居、書類及び所持品について、侵入、捜索及び押収を受けることのない権利は、第三十三条の場合を除いては、正当な理由に基いて発せられ、且つ捜索する場所及び押収する物を明示する令状がなければ、侵されない。2捜索又は押収は、権限を有する司法官憲が発する各別の令状により、これを行ふ。","sourcePages":[6]},{"id":"article-36","articleNumber":36,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"拷問及び残虐な刑罰の禁止","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十六条 公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。","normalizedText":"第三十六条公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。","segments":[{"type":"blank","blankId":"article-36-b1"},{"type":"text","text":"による"},{"type":"blank","blankId":"article-36-b2"},{"type":"text","text":"及び"},{"type":"blank","blankId":"article-36-b3"},{"type":"text","text":"は、絶対にこれを禁ずる。"}],"normalizedBodyText":"公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。","sourcePages":[6]},{"id":"article-37","articleNumber":37,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"刑事被告人の権利","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十七条 すべて刑事事件においては、被告人は、公平な裁判所の迅速な公開裁判を受ける権利を有する。 2 刑事被告人は、すべての証人に対して審問する機会を充分に与へられ、又、公費で自己のために強制的手続により証人を求める権利を有する。 3 刑事被告人は、いかなる場合にも、資格を有する弁護人を依頼することができる。被告人が自らこれを依頼することができないときは、国でこれを附する。","normalizedText":"第三十七条すべて刑事事件においては、被告人は、公平な裁判所の迅速な公開裁判を受ける権利を有する。2刑事被告人は、すべての証人に対して審問する機会を充分に与へられ、又、公費で自己のために強制的手続により証人を求める権利を有する。3刑事被告人は、いかなる場合にも、資格を有する弁護人を依頼することができる。被告人が自らこれを依頼することができないときは、国でこれを附する。","segments":[{"type":"text","text":"すべて刑事事件においては、被告人は、公平な裁判所の迅速な"},{"type":"blank","blankId":"article-37-b1"},{"type":"text","text":"を受ける権利を有する。2刑事被告人は、すべての証人に対して審問する機会を充分に与へられ、又、公費で自己のために強制的手続により証人を求める権利を有する。3刑事被告人は、いかなる場合にも、資格を有する"},{"type":"blank","blankId":"article-37-b2"},{"type":"text","text":"を依頼することができる。被告人が自らこれを依頼することができないときは、"},{"type":"blank","blankId":"article-37-b3"},{"type":"text","text":"でこれを附する。"}],"normalizedBodyText":"すべて刑事事件においては、被告人は、公平な裁判所の迅速な公開裁判を受ける権利を有する。2刑事被告人は、すべての証人に対して審問する機会を充分に与へられ、又、公費で自己のために強制的手続により証人を求める権利を有する。3刑事被告人は、いかなる場合にも、資格を有する弁護人を依頼することができる。被告人が自らこれを依頼することができないときは、国でこれを附する。","sourcePages":[6]},{"id":"article-38","articleNumber":38,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"自白強要の禁止と自白の証拠能力の限界","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十八条 何人も、自己に不利益な供述を強要されない。 2 強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘禁された後の自白は、これを証拠とすることができない。 3 何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされ、又は刑罰を科せられない。","normalizedText":"第三十八条何人も、自己に不利益な供述を強要されない。2強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘禁された後の自白は、これを証拠とすることができない。3何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされ、又は刑罰を科せられない。","segments":[{"type":"text","text":"何人も、"},{"type":"blank","blankId":"article-38-b1"},{"type":"text","text":"な供述を強要されない。2強制、"},{"type":"blank","blankId":"article-38-b2"},{"type":"text","text":"若しくは"},{"type":"blank","blankId":"article-38-b3"},{"type":"text","text":"による自白又は不当に長く"},{"type":"blank","blankId":"article-38-b4"},{"type":"text","text":"若しくは"},{"type":"blank","blankId":"article-38-b5"},{"type":"text","text":"された後の自白は、これを"},{"type":"blank","blankId":"article-38-b6"},{"type":"text","text":"とすることができない。3何人も、"},{"type":"blank","blankId":"article-38-b7"},{"type":"text","text":"な唯一の"},{"type":"blank","blankId":"article-38-b8"},{"type":"text","text":"が本人の"},{"type":"blank","blankId":"article-38-b9"},{"type":"text","text":"である場合には、有罪とされ、又は刑罰を科せられない。"}],"normalizedBodyText":"何人も、自己に不利益な供述を強要されない。2強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘禁された後の自白は、これを証拠とすることができない。3何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされ、又は刑罰を科せられない。","sourcePages":[6]},{"id":"article-39","articleNumber":39,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"遡及処罰、二重処罰等の禁止","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第三十九条 何人も、実行の時に適法であつた行為又は既に無罪とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。","normalizedText":"第三十九条何人も、実行の時に適法であつた行為又は既に無罪とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。","segments":[{"type":"text","text":"何人も、"},{"type":"blank","blankId":"article-39-b1"},{"type":"text","text":"であつた行為又は既に"},{"type":"blank","blankId":"article-39-b2"},{"type":"text","text":"とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。"}],"normalizedBodyText":"何人も、実行の時に適法であつた行為又は既に無罪とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。","sourcePages":[6]},{"id":"article-40","articleNumber":40,"chapterId":"rights-3","chapterTitle":"第三章 国民の権利及び義務","heading":"刑事補償","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十条 何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律の定めるところにより、国にその補償を求めることができる。","normalizedText":"第四十条何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律の定めるところにより、国にその補償を求めることができる。","segments":[{"type":"text","text":"何人も、抑留又は拘禁された後、"},{"type":"blank","blankId":"article-40-b1"},{"type":"text","text":"の裁判を受けたときは、法律の定めるところにより、国にその"},{"type":"blank","blankId":"article-40-b2"},{"type":"text","text":"を求めることができる。"}],"normalizedBodyText":"何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律の定めるところにより、国にその補償を求めることができる。","sourcePages":[6]},{"id":"article-41","articleNumber":41,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"国会の地位","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十一条 国会は、国権の最高機関であつて、国の唯一の立法機関である。","normalizedText":"第四十一条国会は、国権の最高機関であつて、国の唯一の立法機関である。","segments":[{"type":"text","text":"国会は、国権の"},{"type":"blank","blankId":"article-41-b1"},{"type":"text","text":"であつて、国の"},{"type":"blank","blankId":"article-41-b2"},{"type":"text","text":"である。"}],"normalizedBodyText":"国会は、国権の最高機関であつて、国の唯一の立法機関である。","sourcePages":[7]},{"id":"article-42","articleNumber":42,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"二院制","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十二条 国会は、衆議院及び参議院の両議院でこれを構成する。","normalizedText":"第四十二条国会は、衆議院及び参議院の両議院でこれを構成する。","normalizedBodyText":"国会は、衆議院及び参議院の両議院でこれを構成する。"},{"id":"article-43","articleNumber":43,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"両議院の組織","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十三条 両議院は、全国民を代表する選挙された議員でこれを組織する。 2 両議院の議員の定数は、法律でこれを定める。","normalizedText":"第四十三条両議院は、全国民を代表する選挙された議員でこれを組織する。2両議院の議員の定数は、法律でこれを定める。","segments":[{"type":"text","text":"両議院は、"},{"type":"blank","blankId":"article-43-b1"},{"type":"text","text":"選挙された議員でこれを組織する。2両議院の議員の定数は、法律でこれを定める。"}],"normalizedBodyText":"両議院は、全国民を代表する選挙された議員でこれを組織する。2両議院の議員の定数は、法律でこれを定める。","sourcePages":[7]},{"id":"article-44","articleNumber":44,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"議員及び選挙人の資格","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十四条 両議院の議員及びその選挙人の資格は、法律でこれを定める。但し、人種、信条、性別、社会的身分、門地、教育、財産又は収入によつて差別してはならない。","normalizedText":"第四十四条両議院の議員及びその選挙人の資格は、法律でこれを定める。但し、人種、信条、性別、社会的身分、門地、教育、財産又は収入によつて差別してはならない。","segments":[{"type":"text","text":"両議院の議員及びその選挙人の資格は、法律でこれを定める。但し、人種、信条、性別、社会的身分、門地、"},{"type":"blank","blankId":"article-44-b1"},{"type":"text","text":"、財産又は収入によつて差別してはならない。"}],"normalizedBodyText":"両議院の議員及びその選挙人の資格は、法律でこれを定める。但し、人種、信条、性別、社会的身分、門地、教育、財産又は収入によつて差別してはならない。","sourcePages":[7]},{"id":"article-45","articleNumber":45,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"衆議院議員の任期","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十五条 衆議院議員の任期は、四年とする。但し、衆議院解散の場合には、その期間満了前に終了する。","normalizedText":"第四十五条衆議院議員の任期は、四年とする。但し、衆議院解散の場合には、その期間満了前に終了する。","segments":[{"type":"text","text":"衆議院議員の任期は、"},{"type":"blank","blankId":"article-45-b1"},{"type":"text","text":"年とする。但し、衆議院"},{"type":"blank","blankId":"article-45-b2"},{"type":"text","text":"の場合には、その期間満了前に終了する。"}],"normalizedBodyText":"衆議院議員の任期は、四年とする。但し、衆議院解散の場合には、その期間満了前に終了する。","sourcePages":[7]},{"id":"article-46","articleNumber":46,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"参議院議員の任期","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十六条 参議院議員の任期は、六年とし、三年ごとに議員の半数を改選する。","normalizedText":"第四十六条参議院議員の任期は、六年とし、三年ごとに議員の半数を改選する。","segments":[{"type":"text","text":"参議院議員の任期は、"},{"type":"blank","blankId":"article-46-b1"},{"type":"text","text":"年とし、"},{"type":"blank","blankId":"article-46-b2"},{"type":"text","text":"年ごとに議員の"},{"type":"blank","blankId":"article-46-b3"},{"type":"text","text":"を改選する。"}],"normalizedBodyText":"参議院議員の任期は、六年とし、三年ごとに議員の半数を改選する。","sourcePages":[7]},{"id":"article-47","articleNumber":47,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"議員の選挙","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十七条 選挙区、投票の方法その他両議院の議員の選挙に関する事項は、法律でこれを定める。","normalizedText":"第四十七条選挙区、投票の方法その他両議院の議員の選挙に関する事項は、法律でこれを定める。","normalizedBodyText":"選挙区、投票の方法その他両議院の議員の選挙に関する事項は、法律でこれを定める。"},{"id":"article-48","articleNumber":48,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"両議院議員相互兼職の禁止","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十八条 何人も、同時に両議院の議員たることはできない。","normalizedText":"第四十八条何人も、同時に両議院の議員たることはできない。","normalizedBodyText":"何人も、同時に両議院の議員たることはできない。"},{"id":"article-49","articleNumber":49,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"議員の歳費","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第四十九条 両議院の議員は、法律の定めるところにより、国庫から相当額の歳費を受ける。","normalizedText":"第四十九条両議院の議員は、法律の定めるところにより、国庫から相当額の歳費を受ける。","segments":[{"type":"text","text":"両議院の議員は、法律の定めるところにより、国庫から相当額の"},{"type":"blank","blankId":"article-49-b1"},{"type":"text","text":"を受ける。"}],"normalizedBodyText":"両議院の議員は、法律の定めるところにより、国庫から相当額の歳費を受ける。","sourcePages":[7]},{"id":"article-50","articleNumber":50,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"議員の不逮捕特権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十条 両議院の議員は、法律の定める場合を除いては、国会の会期中逮捕されず、会期前に逮捕された議員は、その議院の要求があれば、会期中これを釈放しなければならない。","normalizedText":"第五十条両議院の議員は、法律の定める場合を除いては、国会の会期中逮捕されず、会期前に逮捕された議員は、その議院の要求があれば、会期中これを釈放しなければならない。","segments":[{"type":"text","text":"両議院の議員は、法律の定める場合を除いては、"},{"type":"blank","blankId":"article-50-b1"},{"type":"text","text":"逮捕されず、会期前に逮捕された議員は、その"},{"type":"blank","blankId":"article-50-b2"},{"type":"text","text":"があれば、"},{"type":"blank","blankId":"article-50-b3"},{"type":"text","text":"これを釈放しなければならない。"}],"normalizedBodyText":"両議院の議員は、法律の定める場合を除いては、国会の会期中逮捕されず、会期前に逮捕された議員は、その議院の要求があれば、会期中これを釈放しなければならない。","sourcePages":[7]},{"id":"article-51","articleNumber":51,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"議員の発言表決の無答責","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十一条 両議院の議員は、議院で行つた演説、討論又は表決について、院外で責任を問はれない。","normalizedText":"第五十一条両議院の議員は、議院で行つた演説、討論又は表決について、院外で責任を問はれない。","segments":[{"type":"text","text":"両議院の議員は、"},{"type":"blank","blankId":"article-51-b1"},{"type":"text","text":"で行つた演説、討論又は表決について、"},{"type":"blank","blankId":"article-51-b2"},{"type":"text","text":"で責任を問はれない。"}],"normalizedBodyText":"両議院の議員は、議院で行つた演説、討論又は表決について、院外で責任を問はれない。","sourcePages":[7]},{"id":"article-52","articleNumber":52,"chapterId":"diet-1","chapterTitle":"第四章 国会","heading":"常会","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十二条 国会の常会は、毎年一回これを召集する。","normalizedText":"第五十二条国会の常会は、毎年一回これを召集する。","segments":[{"type":"text","text":"国会の常会は、毎年"},{"type":"blank","blankId":"article-52-b1"},{"type":"text","text":"回これを召集する。"}],"normalizedBodyText":"国会の常会は、毎年一回これを召集する。","sourcePages":[7]},{"id":"article-53","articleNumber":53,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"臨時会","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十三条 内閣は、国会の臨時会の召集を決定することができる。いづれかの議院の総議員の四分の一以上の要求があれば、内閣は、その召集を決定しなければならない。","normalizedText":"第五十三条内閣は、国会の臨時会の召集を決定することができる。いづれかの議院の総議員の四分の一以上の要求があれば、内閣は、その召集を決定しなければならない。","segments":[{"type":"text","text":"内閣は、国会の"},{"type":"blank","blankId":"article-53-b1"},{"type":"text","text":"の召集を決定することができる。いづれかの議院の"},{"type":"blank","blankId":"article-53-b2"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-53-b3"},{"type":"text","text":"以上の要求があれば、"},{"type":"blank","blankId":"article-53-b4"},{"type":"text","text":"は、その召集を決定しなければならない。"}],"normalizedBodyText":"内閣は、国会の臨時会の召集を決定することができる。いづれかの議院の総議員の四分の一以上の要求があれば、内閣は、その召集を決定しなければならない。","sourcePages":[7]},{"id":"article-54","articleNumber":54,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"総選挙、特別会及び緊急集会","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十四条 衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行ひ、その選挙の日から三十日以内に、国会を召集しなければならない。 2 衆議院が解散されたときは、参議院は、同時に閉会となる。但し、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。 3 前項但書の緊急集会において採られた措置は、臨時のものであつて、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失ふ。","normalizedText":"第五十四条衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行ひ、その選挙の日から三十日以内に、国会を召集しなければならない。2衆議院が解散されたときは、参議院は、同時に閉会となる。但し、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。3前項但書の緊急集会において採られた措置は、臨時のものであつて、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失ふ。","segments":[{"type":"text","text":"衆議院が解散されたときは、解散の日から"},{"type":"blank","blankId":"article-54-b1"},{"type":"text","text":"日以内に、衆議院議員の総選挙を行ひ、その選挙の日から"},{"type":"blank","blankId":"article-54-b2"},{"type":"text","text":"日以内に、国会を召集しなければならない。2衆議院が解散されたときは、"},{"type":"blank","blankId":"article-54-b3"},{"type":"text","text":"は、同時に閉会となる。但し、"},{"type":"blank","blankId":"article-54-b4"},{"type":"text","text":"は、国に緊急の必要があるときは、参議院の"},{"type":"blank","blankId":"article-54-b5"},{"type":"text","text":"を求めることができる。3前項但書の"},{"type":"blank","blankId":"article-54-b6"},{"type":"text","text":"において採られた措置は、臨時のものであつて、次の国会開会の後"},{"type":"blank","blankId":"article-54-b7"},{"type":"text","text":"日以内に、"},{"type":"blank","blankId":"article-54-b8"},{"type":"text","text":"の同意がない場合には、その効力を失ふ。"}],"normalizedBodyText":"衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行ひ、その選挙の日から三十日以内に、国会を召集しなければならない。2衆議院が解散されたときは、参議院は、同時に閉会となる。但し、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。3前項但書の緊急集会において採られた措置は、臨時のものであつて、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失ふ。","sourcePages":[7]},{"id":"article-55","articleNumber":55,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"資格争訟","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十五条 両議院は、各々その議員の資格に関する争訟を裁判する。但し、議員の議席を失はせるには、出席議員の三分の二以上の多数による議決を必要とする。","normalizedText":"第五十五条両議院は、各々その議員の資格に関する争訟を裁判する。但し、議員の議席を失はせるには、出席議員の三分の二以上の多数による議決を必要とする。","segments":[{"type":"text","text":"両議院は、各々その議員の資格に関する争訟を裁判する。但し、議員の議席を失はせるには、"},{"type":"blank","blankId":"article-55-b1"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-55-b2"},{"type":"text","text":"以上の多数による議決を必要とする。"}],"normalizedBodyText":"両議院は、各々その議員の資格に関する争訟を裁判する。但し、議員の議席を失はせるには、出席議員の三分の二以上の多数による議決を必要とする。","sourcePages":[8]},{"id":"article-56","articleNumber":56,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"議事の定足数と過半数議決","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十六条 両議院は、各々その総議員の三分の一以上の出席がなければ、議事を開き議決することができない。 2 両議院の議事は、この憲法に特別の定のある場合を除いては、出席議員の過半数でこれを決し、可否同数のときは、議長の決するところによる。","normalizedText":"第五十六条両議院は、各々その総議員の三分の一以上の出席がなければ、議事を開き議決することができない。2両議院の議事は、この憲法に特別の定のある場合を除いては、出席議員の過半数でこれを決し、可否同数のときは、議長の決するところによる。","segments":[{"type":"text","text":"両議院は、各々その"},{"type":"blank","blankId":"article-56-b1"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-56-b2"},{"type":"text","text":"以上の出席がなければ、議事を開き議決することができない。2両議院の議事は、この憲法に特別の定のある場合を除いては、"},{"type":"blank","blankId":"article-56-b3"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-56-b4"},{"type":"text","text":"でこれを決し、可否同数のときは、議長の決するところによる。"}],"normalizedBodyText":"両議院は、各々その総議員の三分の一以上の出席がなければ、議事を開き議決することができない。2両議院の議事は、この憲法に特別の定のある場合を除いては、出席議員の過半数でこれを決し、可否同数のときは、議長の決するところによる。","sourcePages":[8]},{"id":"article-57","articleNumber":57,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"会議の公開と会議録","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十七条 両議院の会議は、公開とする。但し、出席議員の三分の二以上の多数で議決したときは、秘密会を開くことができる。 2 両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に秘密を要すると認められるもの以外は、これを公表し、且つ一般に頒布しなければならない。 3 出席議員の五分の一以上の要求があれば、各議員の表決は、これを会議録に記載しなければならない。","normalizedText":"第五十七条両議院の会議は、公開とする。但し、出席議員の三分の二以上の多数で議決したときは、秘密会を開くことができる。2両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に秘密を要すると認められるもの以外は、これを公表し、且つ一般に頒布しなければならない。3出席議員の五分の一以上の要求があれば、各議員の表決は、これを会議録に記載しなければならない。","segments":[{"type":"text","text":"両議院の会議は、"},{"type":"blank","blankId":"article-57-b1"},{"type":"text","text":"とする。但し、"},{"type":"blank","blankId":"article-57-b2"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-57-b3"},{"type":"text","text":"以上の多数で議決したときは、秘密会を開くことができる。2両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に秘密を要すると認められるもの以外は、これを公表し、且つ一般に頒布しなければならない。3出席議員の五分の一以上の要求があれば、各議員の表決は、これを会議録に記載しなければならない。"}],"normalizedBodyText":"両議院の会議は、公開とする。但し、出席議員の三分の二以上の多数で議決したときは、秘密会を開くことができる。2両議院は、各々その会議の記録を保存し、秘密会の記録の中で特に秘密を要すると認められるもの以外は、これを公表し、且つ一般に頒布しなければならない。3出席議員の五分の一以上の要求があれば、各議員の表決は、これを会議録に記載しなければならない。","sourcePages":[8]},{"id":"article-58","articleNumber":58,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"役員の選任及び議院の自律権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十八条 両議院は、各々その議長その他の役員を選任する。 2 両議院は、各々その会議その他の手続及び内部の規律に関する規則を定め、又、院内の秩序をみだした議員を懲罰することができる。但し、議員を除名するには、出席議員の三分の二以上の多数による議決を必要とする。","normalizedText":"第五十八条両議院は、各々その議長その他の役員を選任する。2両議院は、各々その会議その他の手続及び内部の規律に関する規則を定め、又、院内の秩序をみだした議員を懲罰することができる。但し、議員を除名するには、出席議員の三分の二以上の多数による議決を必要とする。","segments":[{"type":"text","text":"両議院は、各々その議長その他の役員を選任する。2両議院は、各々その会議その他の手続及び内部の規律に関する規則を定め、又、院内の秩序をみだした議員を"},{"type":"blank","blankId":"article-58-b1"},{"type":"text","text":"することができる。但し、議員を除名するには、"},{"type":"blank","blankId":"article-58-b2"},{"type":"text","text":"の"},{"type":"blank","blankId":"article-58-b3"},{"type":"text","text":"以上の多数による議決を必要とする。"}],"normalizedBodyText":"両議院は、各々その議長その他の役員を選任する。2両議院は、各々その会議その他の手続及び内部の規律に関する規則を定め、又、院内の秩序をみだした議員を懲罰することができる。但し、議員を除名するには、出席議員の三分の二以上の多数による議決を必要とする。","sourcePages":[8]},{"id":"article-59","articleNumber":59,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"法律の成立","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第五十九条 法律案は、この憲法に特別の定のある場合を除いては、両議院で可決したとき法律となる。 2 衆議院で可決し、参議院でこれと異なつた議決をし /html/statics/shiryo/dl-constitution.htm","text":"第六十三条 内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有しないとにかかはらず、何時でも議案について発言するため議院に出席することができる。又、答弁又は説明のため出席を求められたときは、出席しなければならない。","normalizedText":"第六十三条内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有しないとにかかはらず、何時でも議案について発言するため議院に出席することができる。又、答弁又は説明のため出席を求められたときは、出席しなければならない。","normalizedBodyText":"内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有しないとにかかはらず、何時でも議案について発言するため議院に出席することができる。又、答弁又は説明のため出席を求められたときは、出席しなければならない。"},{"id":"article-64","articleNumber":64,"chapterId":"diet-2","chapterTitle":"第四章 国会","heading":"弾劾裁判所","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十四条 国会は、罷免の訴追を受けた裁判官を裁判するため、両議院の議員で組織する弾劾裁判所を設ける。 2 弾劾に関する事項は、法律でこれを定める。","normalizedText":"第六十四条国会は、罷免の訴追を受けた裁判官を裁判するため、両議院の議員で組織する弾劾裁判所を設ける。2弾劾に関する事項は、法律でこれを定める。","segments":[{"type":"text","text":"国会は、"},{"type":"blank","blankId":"article-64-b1"},{"type":"text","text":"の訴追を受けた"},{"type":"blank","blankId":"article-64-b2"},{"type":"text","text":"を裁判するため、両議院の議員で組織する"},{"type":"blank","blankId":"article-64-b3"},{"type":"text","text":"を設ける。2弾劾に関する事項は、法律でこれを定める。"}],"normalizedBodyText":"国会は、罷免の訴追を受けた裁判官を裁判するため、両議院の議員で組織する弾劾裁判所を設ける。2弾劾に関する事項は、法律でこれを定める。","sourcePages":[8]},{"id":"article-65","articleNumber":65,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"行政権の帰属","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十五条 行政権は、内閣に属する。","normalizedText":"第六十五条行政権は、内閣に属する。","segments":[{"type":"blank","blankId":"article-65-b1"},{"type":"text","text":"は、内閣に属する。"}],"normalizedBodyText":"行政権は、内閣に属する。","sourcePages":[9]},{"id":"article-66","articleNumber":66,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"内閣の組織と責任","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十六条 内閣は、法律の定めるところにより、その首長たる内閣総理大臣及びその他の国務大臣でこれを組織する。 2 内閣総理大臣その他の国務大臣は、文民でなければならない。 3 内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。","normalizedText":"第六十六条内閣は、法律の定めるところにより、その首長たる内閣総理大臣及びその他の国務大臣でこれを組織する。2内閣総理大臣その他の国務大臣は、文民でなければならない。3内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。","segments":[{"type":"text","text":"内閣は、法律の定めるところにより、その首長たる"},{"type":"blank","blankId":"article-66-b1"},{"type":"text","text":"及びその他の"},{"type":"blank","blankId":"article-66-b2"},{"type":"text","text":"でこれを組織する。2内閣総理大臣その他の国務大臣は、"},{"type":"blank","blankId":"article-66-b3"},{"type":"text","text":"でなければならない。3内閣は、行政権の行使について、"},{"type":"blank","blankId":"article-66-b4"},{"type":"text","text":"に対し連帯して責任を負ふ。"}],"normalizedBodyText":"内閣は、法律の定めるところにより、その首長たる内閣総理大臣及びその他の国務大臣でこれを組織する。2内閣総理大臣その他の国務大臣は、文民でなければならない。3内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。","sourcePages":[9]},{"id":"article-67","articleNumber":67,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"内閣総理大臣の指名","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十七条 内閣総理大臣は、国会議員の中から国会の議決で、これを指名する。この指名は、他のすべての案件に先だつて、これを行ふ。 2 衆議院と参議院とが異なつた指名の議決をした場合に、法律の定めるところにより、両議院の協議会を開いても意見が一致しないとき、又は衆議院が指名の議決をした後、国会休会中の期間を除いて十日以内に、参議院が、指名の議決をしないときは、衆議院の議決を国会の議決とする。","normalizedText":"第六十七条内閣総理大臣は、国会議員の中から国会の議決で、これを指名する。この指名は、他のすべての案件に先だつて、これを行ふ。2衆議院と参議院とが異なつた指名の議決をした場合に、法律の定めるところにより、両議院の協議会を開いても意見が一致しないとき、又は衆議院が指名の議決をした後、国会休会中の期間を除いて十日以内に、参議院が、指名の議決をしないときは、衆議院の議決を国会の議決とする。","segments":[{"type":"text","text":"内閣総理大臣は、"},{"type":"blank","blankId":"article-67-b1"},{"type":"text","text":"の中から国会の議決で、これを指名する。この指名は、他のすべての案件に先だつて、これを行ふ。2衆議院と参議院とが異なつた指名の議決をした場合に、法律の定めるところにより、"},{"type":"blank","blankId":"article-67-b2"},{"type":"text","text":"を開いても意見が一致しないとき、又は衆議院が指名の議決をした後、国会休会中の期間を除いて"},{"type":"blank","blankId":"article-67-b3"},{"type":"text","text":"日以内に、"},{"type":"blank","blankId":"article-67-b4"},{"type":"text","text":"が、指名の議決をしないときは、"},{"type":"blank","blankId":"article-67-b5"},{"type":"text","text":"の議決を国会の議決とする。"}],"normalizedBodyText":"内閣総理大臣は、国会議員の中から国会の議決で、これを指名する。この指名は、他のすべての案件に先だつて、これを行ふ。2衆議院と参議院とが異なつた指名の議決をした場合に、法律の定めるところにより、両議院の協議会を開いても意見が一致しないとき、又は衆議院が指名の議決をした後、国会休会中の期間を除いて十日以内に、参議院が、指名の議決をしないときは、衆議院の議決を国会の議決とする。","sourcePages":[9]},{"id":"article-68","articleNumber":68,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"国務大臣の任免","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十八条 内閣総理大臣は、国務大臣を任命する。但し、その過半数は、国会議員の中から選ばれなければならない。 2 内閣総理大臣は、任意に国務大臣を罷免することができる。","normalizedText":"第六十八条内閣総理大臣は、国務大臣を任命する。但し、その過半数は、国会議員の中から選ばれなければならない。2内閣総理大臣は、任意に国務大臣を罷免することができる。","segments":[{"type":"text","text":"内閣総理大臣は、国務大臣を"},{"type":"blank","blankId":"article-68-b1"},{"type":"text","text":"する。但し、その過半数は、"},{"type":"blank","blankId":"article-68-b2"},{"type":"text","text":"の中から選ばれなければならない。2内閣総理大臣は、任意に国務大臣を"},{"type":"blank","blankId":"article-68-b3"},{"type":"text","text":"することができる。"}],"normalizedBodyText":"内閣総理大臣は、国務大臣を任命する。但し、その過半数は、国会議員の中から選ばれなければならない。2内閣総理大臣は、任意に国務大臣を罷免することができる。","sourcePages":[9]},{"id":"article-69","articleNumber":69,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"不信任決議と解散又は総辞職","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第六十九条 内閣は、衆議院で不信任の決議案を可決し、又は信任の決議案を否決したときは、十日以内に衆議院が解散されない限り、総辞職をしなければならない。","normalizedText":"第六十九条内閣は、衆議院で不信任の決議案を可決し、又は信任の決議案を否決したときは、十日以内に衆議院が解散されない限り、総辞職をしなければならない。","segments":[{"type":"text","text":"内閣は、"},{"type":"blank","blankId":"article-69-b1"},{"type":"text","text":"で"},{"type":"blank","blankId":"article-69-b2"},{"type":"text","text":"の決議案を可決し、又は"},{"type":"blank","blankId":"article-69-b3"},{"type":"text","text":"の決議案を否決したときは、"},{"type":"blank","blankId":"article-69-b4"},{"type":"text","text":"日以内に衆議院が解散されない限り、"},{"type":"blank","blankId":"article-69-b5"},{"type":"text","text":"をしなければならない。"}],"normalizedBodyText":"内閣は、衆議院で不信任の決議案を可決し、又は信任の決議案を否決したときは、十日以内に衆議院が解散されない限り、総辞職をしなければならない。","sourcePages":[9]},{"id":"article-70","articleNumber":70,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"内閣総理大臣の欠缺又は総選挙施行による総辞職","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十条 内閣総理大臣が欠けたとき、又は衆議院議員総選挙の後に初めて国会の召集があつたときは、内閣は、総辞職をしなければならない。","normalizedText":"第七十条内閣総理大臣が欠けたとき、又は衆議院議員総選挙の後に初めて国会の召集があつたときは、内閣は、総辞職をしなければならない。","segments":[{"type":"text","text":"内閣総理大臣が欠けたとき、又は"},{"type":"blank","blankId":"article-70-b1"},{"type":"text","text":"総選挙の後に初めて国会の召集があつたときは、内閣は、"},{"type":"blank","blankId":"article-70-b2"},{"type":"text","text":"をしなければならない。"}],"normalizedBodyText":"内閣総理大臣が欠けたとき、又は衆議院議員総選挙の後に初めて国会の召集があつたときは、内閣は、総辞職をしなければならない。","sourcePages":[9]},{"id":"article-71","articleNumber":71,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"総辞職後の職務続行","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十一条 前二条の場合には、内閣は、あらたに内閣総理大臣が任命されるまで引き続きその職務を行ふ。","normalizedText":"第七十一条前二条の場合には、内閣は、あらたに内閣総理大臣が任命されるまで引き続きその職務を行ふ。","normalizedBodyText":"前二条の場合には、内閣は、あらたに内閣総理大臣が任命されるまで引き続きその職務を行ふ。"},{"id":"article-72","articleNumber":72,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"内閣総理大臣の職務権限","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十二条 内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及び外交関係について国会に報告し、並びに行政各部を指揮監督する。","normalizedText":"第七十二条内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及び外交関係について国会に報告し、並びに行政各部を指揮監督する。","segments":[{"type":"text","text":"内閣総理大臣は、内閣を代表して議案を"},{"type":"blank","blankId":"article-72-b1"},{"type":"text","text":"に提出し、一般国務及び外交関係について"},{"type":"blank","blankId":"article-72-b2"},{"type":"text","text":"に報告し、並びに行政各部を指揮監督する。"}],"normalizedBodyText":"内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及び外交関係について国会に報告し、並びに行政各部を指揮監督する。","sourcePages":[9]},{"id":"article-73","articleNumber":73,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"内閣の職務権限","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十三条 内閣は、他の一般行政事務の外、左の事務を行ふ。 一 法律を誠実に執行し、国務を総理すること。 二 外交関係を処理すること。 三 条約を締結すること。但し、事前に、時宜によつては事後に、国会の承認を経ることを必要とする。 四 法律の定める基準に従ひ、官吏に関する事務を掌理すること。 五 予算を作成して国会に提出すること。 六 この憲法及び法律の規定を実施するために、政令を制定すること。但し、政令には、特にその法律の委任がある場合を除いては、罰則を設けることができない。 七 大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。","normalizedText":"第七十三条内閣は、他の一般行政事務の外、左の事務を行ふ。一法律を誠実に執行し、国務を総理すること。二外交関係を処理すること。三条約を締結すること。但し、事前に、時宜によつては事後に、国会の承認を経ることを必要とする。四法律の定める基準に従ひ、官吏に関する事務を掌理すること。五予算を作成して国会に提出すること。六この憲法及び法律の規定を実施するために、政令を制定すること。但し、政令には、特にその法律の委任がある場合を除いては、罰則を設けることができない。七大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。","segments":[{"type":"text","text":"内閣は、他の一般行政事務の外、左の事務を行ふ。一"},{"type":"blank","blankId":"article-73-b1"},{"type":"text","text":"を誠実に執行し、国務を総理すること。二"},{"type":"blank","blankId":"article-73-b2"},{"type":"text","text":"関係を処理すること。三"},{"type":"blank","blankId":"article-73-b3"},{"type":"text","text":"を締結すること。但し、事前に、時宜によつては事後に、"},{"type":"blank","blankId":"article-73-b4"},{"type":"text","text":"を経ることを必要とする。四法律の定める基準に従ひ、官吏に関する事務を掌理すること。五"},{"type":"blank","blankId":"article-73-b5"},{"type":"text","text":"を作成して"},{"type":"blank","blankId":"article-73-b6"},{"type":"text","text":"に提出すること。六この憲法及び法律の規定を実施するために、"},{"type":"blank","blankId":"article-73-b7"},{"type":"text","text":"を制定すること。但し、"},{"type":"blank","blankId":"article-73-b8"},{"type":"text","text":"には、特にその法律の委任がある場合を除いては、"},{"type":"blank","blankId":"article-73-b9"},{"type":"text","text":"を設けることができない。七大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。"}],"normalizedBodyText":"内閣は、他の一般行政事務の外、左の事務を行ふ。一法律を誠実に執行し、国務を総理すること。二外交関係を処理すること。三条約を締結すること。但し、事前に、時宜によつては事後に、国会の承認を経ることを必要とする。四法律の定める基準に従ひ、官吏に関する事務を掌理すること。五予算を作成して国会に提出すること。六この憲法及び法律の規定を実施するために、政令を制定すること。但し、政令には、特にその法律の委任がある場合を除いては、罰則を設けることができない。七大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。","sourcePages":[9]},{"id":"article-74","articleNumber":74,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"法律及び政令への署名と連署","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十四条 法律及び政令には、すべて主任の国務大臣が署名し、内閣総理大臣が連署することを必要とする。","normalizedText":"第七十四条法律及び政令には、すべて主任の国務大臣が署名し、内閣総理大臣が連署することを必要とする。","normalizedBodyText":"法律及び政令には、すべて主任の国務大臣が署名し、内閣総理大臣が連署することを必要とする。"},{"id":"article-75","articleNumber":75,"chapterId":"cabinet","chapterTitle":"第五章 内閣","heading":"国務大臣訴追の制約","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十五条 国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。","normalizedText":"第七十五条国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。","segments":[{"type":"text","text":"国務大臣は、その在任中、"},{"type":"blank","blankId":"article-75-b1"},{"type":"text","text":"の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。"}],"normalizedBodyText":"国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。","sourcePages":[10]},{"id":"article-76","articleNumber":76,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"司法権の機関と裁判官の職務上の独立","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十六条 すべて司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。 2 特別裁判所は、これを設置することができない。行政機関は、終審として裁判を行ふことができない。 3 すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲法及び法律にのみ拘束される。","normalizedText":"第七十六条すべて司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。2特別裁判所は、これを設置することができない。行政機関は、終審として裁判を行ふことができない。3すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲法及び法律にのみ拘束される。","segments":[{"type":"text","text":"すべて司法権は、"},{"type":"blank","blankId":"article-76-b1"},{"type":"text","text":"及び法律の定めるところにより設置する"},{"type":"blank","blankId":"article-76-b2"},{"type":"text","text":"に属する。2特別裁判所は、これを設置することができない。"},{"type":"blank","blankId":"article-76-b3"},{"type":"text","text":"機関は、終審として裁判を行ふことができない。3すべて裁判官は、その"},{"type":"blank","blankId":"article-76-b4"},{"type":"text","text":"に従ひ"},{"type":"blank","blankId":"article-76-b5"},{"type":"text","text":"してその職権を行ひ、この"},{"type":"blank","blankId":"article-76-b6"},{"type":"text","text":"及び"},{"type":"blank","blankId":"article-76-b7"},{"type":"text","text":"にのみ拘束される。"}],"normalizedBodyText":"すべて司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。2特別裁判所は、これを設置することができない。行政機関は、終審として裁判を行ふことができない。3すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲法及び法律にのみ拘束される。","sourcePages":[10]},{"id":"article-77","articleNumber":77,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"最高裁判所の規則制定権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十七条 最高裁判所は、訴訟に関する手続、弁護士、裁判所の内部規律及び司法事務処理に関する事項について、規則を定める権限を有する。 2 検察官は、最高裁判所の定める規則に従はなければならない。 3 最高裁判所は、下級裁判所に関する規則を定める権限を、下級裁判所に委任することができる。","normalizedText":"第七十七条最高裁判所は、訴訟に関する手続、弁護士、裁判所の内部規律及び司法事務処理に関する事項について、規則を定める権限を有する。2検察官は、最高裁判所の定める規則に従はなければならない。3最高裁判所は、下級裁判所に関する規則を定める権限を、下級裁判所に委任することができる。","normalizedBodyText":"最高裁判所は、訴訟に関する手続、弁護士、裁判所の内部規律及び司法事務処理に関する事項について、規則を定める権限を有する。2検察官は、最高裁判所の定める規則に従はなければならない。3最高裁判所は、下級裁判所に関する規則を定める権限を、下級裁判所に委任することができる。"},{"id":"article-78","articleNumber":78,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"裁判官の身分の保障","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十八条 裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の弾劾によらなければ罷免されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。","normalizedText":"第七十八条裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の弾劾によらなければ罷免されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。","segments":[{"type":"text","text":"裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の"},{"type":"blank","blankId":"article-78-b1"},{"type":"text","text":"によらなければ"},{"type":"blank","blankId":"article-78-b2"},{"type":"text","text":"されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。"}],"normalizedBodyText":"裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の弾劾によらなければ罷免されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。","sourcePages":[10]},{"id":"article-79","articleNumber":79,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"最高裁判所の構成及び裁判官任命の国民審査","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第七十九条 最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、内閣でこれを任命する。 2 最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議員総選挙の際国民の審査に付し、その後十年を経過した後初めて行はれる衆議院議員総選挙の際更に審査に付し、その後も同様とする。 3 前項の場合において、投票者の多数が裁判官の罷免を可とするときは、その裁判官は、罷免される。 4 審査に関する事項は、法律でこれを定める。 5 最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。 6 最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","normalizedText":"第七十九条最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、内閣でこれを任命する。2最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議員総選挙の際国民の審査に付し、その後十年を経過した後初めて行はれる衆議院議員総選挙の際更に審査に付し、その後も同様とする。3前項の場合において、投票者の多数が裁判官の罷免を可とするときは、その裁判官は、罷免される。4審査に関する事項は、法律でこれを定める。5最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。6最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","segments":[{"type":"text","text":"最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、"},{"type":"blank","blankId":"article-79-b1"},{"type":"text","text":"でこれを任命する。2最高裁判所の裁判官の任命は、その任命後初めて行はれる"},{"type":"blank","blankId":"article-79-b2"},{"type":"text","text":"総選挙の際"},{"type":"blank","blankId":"article-79-b3"},{"type":"text","text":"に付し、その後十年を経過した後初めて行はれる"},{"type":"blank","blankId":"article-79-b4"},{"type":"text","text":"総選挙の際更に審査に付し、その後も同様とする。3前項の場合において、投票者の多数が裁判官の"},{"type":"blank","blankId":"article-79-b5"},{"type":"text","text":"を可とするときは、その裁判官は、"},{"type":"blank","blankId":"article-79-b6"},{"type":"text","text":"される。4審査に関する事項は、法律でこれを定める。5最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。6最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。"}],"normalizedBodyText":"最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、内閣でこれを任命する。2最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議員総選挙の際国民の審査に付し、その後十年を経過した後初めて行はれる衆議院議員総選挙の際更に審査に付し、その後も同様とする。3前項の場合において、投票者の多数が裁判官の罷免を可とするときは、その裁判官は、罷免される。4審査に関する事項は、法律でこれを定める。5最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。6最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","sourcePages":[10]},{"id":"article-80","articleNumber":80,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"下級裁判所の裁判官","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十条 下級裁判所の裁判官は、最高裁判所の指名した者の名簿によつて、内閣でこれを任命する。その裁判官は、任期を十年とし、再任されることができる。但し、法律の定める年齢に達した時には退官する。 2 下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","normalizedText":"第八十条下級裁判所の裁判官は、最高裁判所の指名した者の名簿によつて、内閣でこれを任命する。その裁判官は、任期を十年とし、再任されることができる。但し、法律の定める年齢に達した時には退官する。2下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","segments":[{"type":"text","text":"下級裁判所の裁判官は、"},{"type":"blank","blankId":"article-80-b1"},{"type":"text","text":"の指名した者の名簿によつて、"},{"type":"blank","blankId":"article-80-b2"},{"type":"text","text":"でこれを任命する。その裁判官は、任期を十年とし、再任されることができる。但し、法律の定める年齢に達した時には退官する。2下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。"}],"normalizedBodyText":"下級裁判所の裁判官は、最高裁判所の指名した者の名簿によつて、内閣でこれを任命する。その裁判官は、任期を十年とし、再任されることができる。但し、法律の定める年齢に達した時には退官する。2下級裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。","sourcePages":[10]},{"id":"article-81","articleNumber":81,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"最高裁判所の法令審査権","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十一条 最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合するかしないかを決定する権限を有する終審裁判所である。","normalizedText":"第八十一条最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合するかしないかを決定する権限を有する終審裁判所である。","segments":[{"type":"text","text":"最高裁判所は、一切の法律、命令、規則又は処分が"},{"type":"blank","blankId":"article-81-b1"},{"type":"text","text":"に適合するかしないかを決定する権限を有する"},{"type":"blank","blankId":"article-81-b2"},{"type":"text","text":"裁判所である。"}],"normalizedBodyText":"最高裁判所は、一切の法律、命令、規則又は処分が憲法に適合するかしないかを決定する権限を有する終審裁判所である。","sourcePages":[10]},{"id":"article-82","articleNumber":82,"chapterId":"judiciary","chapterTitle":"第六章 司法","heading":"対審及び判決の公開","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/shiryo/dl-constitution.htm","text":"第八十二条 裁判の対審及び判決は、公開法廷でこれを行ふ。 2 裁判所が、裁判官の全員一致で、公の秩序又は善良の風俗を害する虞があると決した場合には、対審は、公開しないでこれを行ふことができる。但し、政治犯罪、出版に関する犯罪又はこの憲法第三章で保障する国民の権利が問題となつてゐる事件の対審は、常にこれを公開しなければならない。","normalizedText":"第八十二条裁判の対審及び判決は、公開法廷でこれを行ふ。2裁判所が、裁判官の全員一致で、公の秩序又は善良の風俗を害する虞があると決した場合には、対審は、公開しないでこれを行ふことができる。但し、政治犯罪、出版に関する犯罪又はこの憲法第三章で保障する国民の権利が問題となつてゐる事件の対審は、常にこれを公開しなければならない。","segments":[{"type":"text","text":"裁判の"},{"type":"blank","blankId":"article-82-b1"},{"type":"text","text":"及び"},{"type":"blank","blankId":"article-82-b2"},{"type":"text","text":"は、"},{"type":"blank","blankId":"arti
